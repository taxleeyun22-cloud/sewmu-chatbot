<!-- 모달 슬롯 (Phase H2 2026-05-04): admin-modals.html 26개 모달 + #imgViewer + #msgCtxMenu 가 fetch 후 여기 삽입됨 -->
<div id="adminModalsSlot"></div>

<!-- 모달 fetch — DOMContentLoaded 즉시 실행. fetch 비동기이지만 사용자 클릭 시점에는 거의 끝남 (~50ms).
     함수 (window.openCustomerDashboard 등) 가 호출 시점 document.getElementById(...) 로 접근하므로 OK. -->
<script>
(function loadAdminModals(){
  function inject(){
    fetch('/admin-modals.html?v=1', {cache: 'no-cache'})
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(html => {
        var slot = document.getElementById('adminModalsSlot');
        if(slot) slot.insertAdjacentHTML('beforeend', html);
      })
      .catch(err => console.error('[admin-modals] fetch fail:', err));
  }
  if(document.readyState === 'loading')
    document.addEventListener('DOMContentLoaded', inject);
  else inject();
})();
</script>
