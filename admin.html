<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세무회계 이윤 - 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;color:#333}
.header{background:#1a2d4e;padding:14px 20px;color:#fff;display:flex;align-items:center;gap:12px}
.header h1{font-size:1.1em}
.header .tab{margin-left:auto;display:flex;gap:8px}
.header .tab button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.85em}
.header .tab button.active{background:#4a6cf7}

/* 로그인 */
.login{display:flex;align-items:center;justify-content:center;height:80vh}
.login-box{background:#fff;padding:32px;border-radius:12px;text-align:center;width:320px}
.login-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin:12px 0;text-align:center}
.login-box button{width:100%;padding:10px;background:#1a2d4e;color:#fff;border:none;border-radius:8px;cursor:pointer}

/* 컨텐츠 */
.content{max-width:900px;margin:20px auto;padding:0 20px}
.panel{display:none}
.panel.active{display:block}

/* 대화목록 */
.session-list{background:#fff;border-radius:10px;overflow:hidden}
.session-item{padding:14px 20px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.1s}
.session-item:hover{background:#f8f9ff}
.session-id{font-size:.82em;color:#888}
.session-time{font-size:.78em;color:#aaa}
.session-count{background:#4a6cf7;color:#fff;font-size:.72em;padding:2px 8px;border-radius:10px}

/* 대화상세 */
.chat-detail{background:#fff;border-radius:10px;padding:20px;margin-top:12px}
.chat-detail .msg{margin:8px 0;padding:8px 12px;border-radius:8px;font-size:.88em;line-height:1.5}
.chat-detail .msg.user{background:#1a2d4e;color:#fff;margin-left:20%;text-align:right}
.chat-detail .msg.assistant{background:#f4f6fa;margin-right:20%}
.chat-detail .msg .time{font-size:.7em;color:#aaa;margin-top:4px}
.back-btn{background:none;border:1px solid #ddd;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85em;margin-bottom:12px}

/* 칼럼 */
.article-list{background:#fff;border-radius:10px;overflow:hidden}
.article-item{padding:14px 20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.article-item .title{font-weight:600}
.article-item .cat{font-size:.75em;color:#4a6cf7;background:#eef1ff;padding:2px 8px;border-radius:4px}
.article-item .date{font-size:.78em;color:#aaa}
.add-btn{display:block;width:100%;padding:12px;background:#1a2d4e;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.9em;margin-bottom:16px}
.editor{background:#fff;border-radius:10px;padding:20px;margin-top:12px}
.editor input,.editor select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px;font-size:.9em}
.editor textarea{width:100%;height:300px;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:.88em;line-height:1.6;resize:vertical}
.editor .btn-row{display:flex;gap:8px;margin-top:12px}
.editor button{padding:10px 24px;border:none;border-radius:6px;cursor:pointer;font-size:.9em}
.editor .save{background:#1a2d4e;color:#fff}
.editor .cancel{background:#eee}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginView" class="login">
    <div class="login-box">
        <h2 style="color:#1a2d4e;margin-bottom:8px">관리자 로그인</h2>
        <input type="password" id="adminKeyInput" placeholder="관리자 키 입력" onkeydown="if(event.key==='Enter')adminLogin()">
        <button onclick="adminLogin()">로그인</button>
        <p id="loginErr" style="color:#e74c3c;font-size:.82em;margin-top:8px"></p>
    </div>
</div>

<!-- 메인 -->
<div id="mainView" style="display:none">
    <div class="header">
        <h1>세무회계 이윤 관리자</h1>
        <div class="tab">
            <button class="active" onclick="showPanel('convPanel',this)">대화 내역</button>
            <button onclick="showPanel('articlePanel',this)">칼럼 관리</button>
        </div>
    </div>

    <div class="content">
        <!-- 대화내역 패널 -->
        <div id="convPanel" class="panel active">
            <h3 style="margin-bottom:12px">최근 대화 내역</h3>
            <div id="sessionList" class="session-list"></div>
            <div id="chatDetail" style="display:none">
                <button class="back-btn" onclick="backToList()">목록으로</button>
                <div id="chatMessages" class="chat-detail"></div>
            </div>
        </div>

        <!-- 칼럼 관리 패널 -->
        <div id="articlePanel" class="panel">
            <button class="add-btn" onclick="showEditor()">새 칼럼 작성</button>
            <div id="articleList" class="article-list"></div>
            <div id="articleEditor" class="editor" style="display:none">
                <input type="hidden" id="editId">
                <input type="text" id="editTitle" placeholder="제목">
                <select id="editCategory">
                    <option value="">카테고리 선택</option>
                    <option value="종합소득세">종합소득세</option>
                    <option value="부가가치세">부가가치세</option>
                    <option value="법인세">법인세</option>
                    <option value="상속세/증여세">상속세/증여세</option>
                    <option value="양도소득세">양도소득세</option>
                    <option value="절세팁">절세팁</option>
                    <option value="창업/사업자">창업/사업자</option>
                    <option value="기타">기타</option>
                </select>
                <textarea id="editContent" placeholder="내용 (네이버 블로그 글 복사해서 붙여넣기 하세요)"></textarea>
                <div class="btn-row">
                    <button class="save" onclick="saveArticle()">저장</button>
                    <button class="cancel" onclick="hideEditor()">취소</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let ADMIN_KEY = "";

function adminLogin() {
    ADMIN_KEY = document.getElementById("adminKeyInput").value.trim();
    if (!ADMIN_KEY) return;
    fetch("/api/conversations?key=" + ADMIN_KEY).then(r => {
        if (r.ok) {
            document.getElementById("loginView").style.display = "none";
            document.getElementById("mainView").style.display = "block";
            loadSessions();
            loadArticles();
        } else {
            document.getElementById("loginErr").textContent = "키가 올바르지 않습니다";
        }
    });
}

function showPanel(id, btn) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    document.querySelectorAll(".tab button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}

// ===== 대화 내역 =====
async function loadSessions() {
    const res = await fetch("/api/conversations?key=" + ADMIN_KEY);
    const data = await res.json();
    const list = document.getElementById("sessionList");
    list.innerHTML = "";
    if (!data.sessions || data.sessions.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:#888">아직 대화 내역이 없습니다</div>';
        return;
    }
    for (const s of data.sessions) {
        const div = document.createElement("div");
        div.className = "session-item";
        div.innerHTML = `
            <div><div class="session-id">${s.session_id.substring(0,16)}...</div>
            <div class="session-time">${s.started_at} ~ ${s.last_at}</div></div>
            <span class="session-count">${s.msg_count}건</span>`;
        div.onclick = () => loadDetail(s.session_id);
        list.appendChild(div);
    }
}

async function loadDetail(sessionId) {
    const res = await fetch("/api/conversation-detail?key=" + ADMIN_KEY + "&session=" + sessionId);
    const data = await res.json();
    document.getElementById("sessionList").style.display = "none";
    document.getElementById("chatDetail").style.display = "block";
    const box = document.getElementById("chatMessages");
    box.innerHTML = "";
    for (const m of (data.messages || [])) {
        const div = document.createElement("div");
        div.className = "msg " + m.role;
        div.innerHTML = m.content.replace(/\n/g,"<br>") + '<div class="time">' + m.created_at + '</div>';
        box.appendChild(div);
    }
}

function backToList() {
    document.getElementById("sessionList").style.display = "block";
    document.getElementById("chatDetail").style.display = "none";
}

// ===== 칼럼 관리 =====
async function loadArticles() {
    const res = await fetch("/api/articles");
    const data = await res.json();
    const list = document.getElementById("articleList");
    list.innerHTML = "";
    if (!data.articles || data.articles.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:#888">아직 칼럼이 없습니다</div>';
        return;
    }
    for (const a of data.articles) {
        const div = document.createElement("div");
        div.className = "article-item";
        div.innerHTML = `
            <div><span class="title">${a.title}</span> <span class="cat">${a.category}</span></div>
            <span class="date">${a.created_at?.substring(0,10)}</span>`;
        div.style.cursor = "pointer";
        div.onclick = () => editArticle(a.id);
        list.appendChild(div);
    }
}

function showEditor() {
    document.getElementById("editId").value = "";
    document.getElementById("editTitle").value = "";
    document.getElementById("editCategory").value = "";
    document.getElementById("editContent").value = "";
    document.getElementById("articleEditor").style.display = "block";
}

function hideEditor() {
    document.getElementById("articleEditor").style.display = "none";
}

async function editArticle(id) {
    const res = await fetch("/api/articles?id=" + id);
    const a = await res.json();
    document.getElementById("editId").value = a.id;
    document.getElementById("editTitle").value = a.title;
    document.getElementById("editCategory").value = a.category;
    document.getElementById("editContent").value = a.content;
    document.getElementById("articleEditor").style.display = "block";
}

async function saveArticle() {
    const id = document.getElementById("editId").value;
    const body = {
        title: document.getElementById("editTitle").value,
        category: document.getElementById("editCategory").value,
        content: document.getElementById("editContent").value,
    };
    if (id) body.id = parseInt(id);

    await fetch("/api/articles?key=" + ADMIN_KEY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
    });
    hideEditor();
    loadArticles();
}
</script>
</body>
</html>
