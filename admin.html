<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>кіАл¶ђмЮР - мДЄлђінЪМк≥Д мЭімЬ§</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f2f4f6;color:#191f28;min-height:100vh}
.wrap{max-width:800px;margin:0 auto;padding:20px}

/* л°ЬкЈЄмЭЄ */
.login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:360px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.login-box h1{font-size:1.3em;margin-bottom:8px}
.login-box p{font-size:.85em;color:#8b95a1;margin-bottom:24px}
.login-box input{width:100%;padding:14px;border:1px solid #e5e8eb;border-radius:12px;font-size:.9em;outline:none;font-family:inherit}
.login-box input:focus{border-color:#3182f6}
.login-box button{width:100%;margin-top:12px;padding:14px;background:#3182f6;color:#fff;border:none;border-radius:12px;font-size:.9em;font-weight:600;cursor:pointer;font-family:inherit}
.login-err{color:#f04452;font-size:.8em;margin-top:10px;display:none}

/* нЧ§лНФ */
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.hdr h1{font-size:1.1em;font-weight:700}
.hdr .tabs{display:flex;gap:6px;margin-left:12px}
.hdr .tabs button{background:#e5e8eb;border:none;padding:6px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#8b95a1;font-weight:500}
.hdr .tabs button.on{background:#3182f6;color:#fff}
.hdr .logout{margin-left:auto;background:none;border:1px solid #e5e8eb;padding:6px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#8b95a1}

/* л¶ђмК§нКЄ */
.item{display:flex;align-items:center;gap:14px;padding:16px;background:#fff;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.item:hover{background:#f8f9fa}
.avatar{width:40px;height:40px;border-radius:50%;background:#3182f6;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8em;font-weight:600;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.info{flex:1;min-width:0}
.info .name{font-size:.9em;font-weight:600}
.info .meta{font-size:.72em;color:#8b95a1;margin-top:2px}
.badge{font-size:.7em;background:#e8f3ff;color:#3182f6;padding:2px 8px;border-radius:8px;font-weight:600}
.right{text-align:right;flex-shrink:0}
.right .time{font-size:.72em;color:#8b95a1}
.right .cnt{font-size:.72em;color:#3182f6;font-weight:600}
.empty{text-align:center;padding:60px;color:#8b95a1}

/* мГБмДЄ */
.detail{display:none}
.back{background:none;border:none;font-size:1em;cursor:pointer;padding:4px 8px;border-radius:8px;margin-bottom:16px}
.back:hover{background:#e5e8eb}
.msg{padding:14px 18px;border-radius:12px;font-size:.88em;line-height:1.7;margin-bottom:6px;max-width:85%;white-space:pre-wrap;word-break:break-word}
.msg.user{background:#3182f6;color:#fff;margin-left:auto;border-radius:16px 4px 16px 16px}
.msg.assistant{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.03);border-radius:4px 16px 16px 16px}
.msg .ts{font-size:.65em;opacity:.5;margin-top:6px}

/* лґДмДЭ */
.analytics{display:none}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.stat .n{font-size:1.6em;font-weight:700;color:#3182f6}
.stat .l{font-size:.72em;color:#8b95a1;margin-top:2px}
.sec{font-size:.95em;font-weight:700;margin:20px 0 10px}
.bar-item{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.bar-label{width:100px;font-size:.82em;font-weight:500;flex-shrink:0}
.bar-track{flex:1;height:24px;background:#e5e8eb;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:#3182f6;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:.7em;color:#fff;font-weight:600;min-width:20px}
.bar-cnt{width:40px;text-align:right;font-size:.8em;color:#8b95a1;flex-shrink:0}
.kw-wrap{display:flex;flex-wrap:wrap;gap:6px}
.kw{background:#fff;padding:6px 14px;border-radius:14px;font-size:.82em;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.kw b{color:#3182f6;margin-left:4px}

/* мЛ†лҐ∞лПД л±ГмІА */
.conf{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.68em;font-weight:700;margin-left:4px}
.conf.high{background:#e0f5ec;color:#10b981}
.conf.medium{background:#fef3c7;color:#b45309}
.conf.low{background:#fee2e2;color:#dc2626}

/* к≤Ам¶Э нГ≠ */
.review{display:none}
.review-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.review-filters button{background:#fff;border:1px solid #e5e8eb;padding:6px 12px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#8b95a1;font-weight:500}
.review-filters button.on{background:#3182f6;color:#fff;border-color:#3182f6}
.review-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.review-card .r-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.78em;color:#8b95a1}
.review-card .r-q{background:#f2f4f6;padding:10px 14px;border-radius:8px;font-size:.85em;margin-bottom:8px;font-weight:500}
.review-card .r-q::before{content:"Q. ";color:#3182f6;font-weight:700}
.review-card .r-a{font-size:.85em;line-height:1.6;white-space:pre-wrap;padding:4px 2px;max-height:200px;overflow-y:auto}
.review-card .r-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #f2f4f6}
.review-card .r-actions button{flex:1;padding:8px;border:none;border-radius:8px;font-size:.78em;font-weight:600;cursor:pointer;font-family:inherit}
.review-card .btn-ok{background:#e0f5ec;color:#10b981}
.review-card .btn-fix{background:#fef3c7;color:#b45309}
.review-card .btn-del{background:#fee2e2;color:#dc2626}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- л°ЬкЈЄмЭЄ -->
<div class="login" id="loginView">
<div class="login-box">
<h1>кіАл¶ђмЮР</h1>
<p>мДЄлђінЪМк≥Д мЭімЬ§ м±ЧліЗ кіАл¶ђ</p>
<input type="password" id="keyInput" placeholder="кіАл¶ђмЮР нВ§" onkeydown="if(event.key==='Enter')login()">
<button onclick="login()">л°ЬкЈЄмЭЄ</button>
<div class="login-err" id="err">нВ§л•Љ нЩХмЭЄнХім£ЉмДЄмЪФ</div>
</div>
</div>

<!-- л©ФмЭЄ -->
<div class="wrap" id="mainView" style="display:none">
<div class="hdr">
<h1>кіАл¶ђмЮР</h1>
<div class="tabs">
<button class="on" id="tabChat" onclick="tab('chat')">лМАнЩФ</button>
<button id="tabUsers" onclick="tab('users')">мВђмЪ©мЮР<span id="pendingBadge" style="display:none;background:#f04452;color:#fff;border-radius:10px;padding:1px 6px;font-size:.75em;margin-left:4px">0</span></button>
<button id="tabAnal" onclick="tab('anal')">лґДмДЭ</button>
<button id="tabReview" onclick="tab('review')">к≤Ам¶Э <span id="reviewBadge" style="display:none;background:#f04452;color:#fff;padding:1px 6px;border-radius:10px;font-size:.9em;margin-left:2px"></span></button>
</div>
<button class="logout" onclick="logout()">л°ЬкЈЄмХДмЫГ</button>
</div>

<div id="chatView">
<div id="list"></div>
</div>

<div class="detail" id="detailView">
<button class="back" onclick="backToList()">вЖР л™©л°Э</button>
<div id="msgs"></div>
</div>

<div class="analytics" id="analView"></div>

<!-- мВђмЪ©мЮР мКємЭЄ кіАл¶ђ -->
<div id="usersView" style="display:none">
<div class="tabs" style="margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap">
<button class="on" id="uStPending" onclick="userStatus('pending')" style="background:#f04452;border:none;padding:6px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#fff;font-weight:500">лМАкЄ∞ <span id="cPending">0</span></button>
<button id="uStClient" onclick="userStatus('approved_client')" style="background:#e5e8eb;border:none;padding:6px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#8b95a1;font-weight:500">кЄ∞мЮ•к±∞лЮШм≤Ш <span id="cClient">0</span></button>
<button id="uStGuest" onclick="userStatus('approved_guest')" style="background:#e5e8eb;border:none;padding:6px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#8b95a1;font-weight:500">мЭЉл∞ШмКємЭЄ <span id="cGuest">0</span></button>
<button id="uStRejected" onclick="userStatus('rejected')" style="background:#e5e8eb;border:none;padding:6px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;color:#8b95a1;font-weight:500">к±∞м†И <span id="cRejected">0</span></button>
</div>
<div id="userList"></div>
</div>

<!-- к≤Ам¶Э (лЛµл≥А нТИмІИ кіАл¶ђ) -->
<div class="review" id="reviewView">
<div class="review-filters">
<button class="on" id="fltPending" onclick="filt('pending')">вЪ†пЄП к≤Ам¶Э лМАкЄ∞</button>
<button id="fltMedium" onclick="filt('medium')">рЯЯ° л≥інЖµ</button>
<button id="fltLow" onclick="filt('low')">рЯФі лВЃмЭМ</button>
<button id="fltReported" onclick="filt('reported')">рЯУҐ мЛ†к≥†</button>
<button id="fltAll" onclick="filt('all')">м†Дм≤і</button>
<button onclick="migrateConf()" style="margin-left:auto;background:#e5e8eb;color:#555;font-size:.72em">рЯФД кЄ∞м°ілЛµл≥А лґДл•Ш</button>
<button onclick="syncGithub()" style="background:#191f28;color:#fff;font-size:.72em">рЯЪА Claude нШЄмґЬ</button>
<button onclick="bulkReview()" style="background:#10b981;color:#fff;font-size:.72em">вЬЕ мЭЉкіД м≤Шл¶ђмЩДл£М</button>
</div>
<div id="reviewList"></div>
</div>
</div>

<script>
let KEY='';
function e(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function login(){
KEY=document.getElementById('keyInput').value.trim();
if(!KEY)return;
try{
const r=await fetch('/api/conversations?key='+encodeURIComponent(KEY)+'&page=1');
if(!r.ok)throw 0;
document.getElementById('loginView').style.display='none';
document.getElementById('mainView').style.display='block';
loadList();
refreshPendingBadge();
setInterval(refreshPendingBadge,30000);
}catch{document.getElementById('err').style.display='block'}
}

function logout(){
KEY='';
document.getElementById('loginView').style.display='flex';
document.getElementById('mainView').style.display='none';
}

function tab(t){
document.getElementById('tabChat').className=t==='chat'?'on':'';
document.getElementById('tabUsers').className=t==='users'?'on':'';
document.getElementById('tabAnal').className=t==='anal'?'on':'';
document.getElementById('tabReview').className=t==='review'?'on':'';
document.getElementById('chatView').style.display=t==='chat'?'block':'none';
document.getElementById('detailView').style.display='none';
document.getElementById('usersView').style.display=t==='users'?'block':'none';
document.getElementById('analView').style.display=t==='anal'?'block':'none';
document.getElementById('reviewView').style.display=t==='review'?'block':'none';
if(t==='anal')loadAnalytics();
if(t==='users')loadUsers(currentStatus||'pending');
if(t==='review')loadReview('pending');
}

let currentStatus='pending';
async function refreshPendingBadge(){
try{
const r=await fetch('/api/admin-approve?key='+encodeURIComponent(KEY)+'&status=pending');
const d=await r.json();
const n=(d.counts&&d.counts.pending)||0;
const b=document.getElementById('pendingBadge');
if(n>0){b.textContent=n;b.style.display='inline-block'}else{b.style.display='none'}
}catch{}
}

function userStatus(s){
currentStatus=s;
['Pending','Client','Guest','Rejected'].forEach(k=>{
const el=document.getElementById('uSt'+k);
const active=('uSt'+k).toLowerCase().indexOf(s.replace('approved_','').toLowerCase())>=0;
el.style.background=active?(s==='rejected'?'#8b95a1':s==='pending'?'#f04452':'#3182f6'):'#e5e8eb';
el.style.color=active?'#fff':'#8b95a1';
});
loadUsers(s);
}

async function loadUsers(status){
const el=document.getElementById('userList');
el.innerHTML='<div class="empty">лґИлЯђмШ§лКФ м§С...</div>';
try{
const r=await fetch('/api/admin-approve?key='+encodeURIComponent(KEY)+'&status='+encodeURIComponent(status));
const d=await r.json();
if(d.counts){
document.getElementById('cPending').textContent=d.counts.pending||0;
document.getElementById('cClient').textContent=d.counts.approved_client||0;
document.getElementById('cGuest').textContent=d.counts.approved_guest||0;
document.getElementById('cRejected').textContent=d.counts.rejected||0;
}
if(!d.users||d.users.length===0){el.innerHTML='<div class="empty">нХілЛє мГБнГЬмЭШ мВђмЪ©мЮРк∞А мЧЖмКµлЛИлЛ§</div>';return}
el.innerHTML=d.users.map(u=>{
const nm=u.real_name||u.name||'мЭіл¶ДмЧЖмЭМ';
const av=u.profile_image?'<img src="'+e(u.profile_image)+'" alt="">':nm[0];
const pv=u.provider||'';
const phone=u.phone?' ¬Ј '+e(u.phone):'';
const nameConf=u.name_confirmed?'':'<span style="color:#f04452;font-size:.72em">вЪ†пЄПл≥Єл™ЕлѓЄнЩХмЭЄ</span> ';
const todayCnt=u.today_count||0;
let actions='';
if(status==='pending'){
actions='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'
+'<button onclick="approveUser('+u.id+',\'approve_client\')" style="background:#3182f6;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;font-weight:600">вЬУ кЄ∞мЮ•к±∞лЮШм≤Ш мКємЭЄ</button>'
+'<button onclick="approveUser('+u.id+',\'approve_guest\')" style="background:#00c471;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;font-weight:600">вЧЛ мЭЉл∞Ш мКємЭЄ</button>'
+'<button onclick="rejectUser('+u.id+')" style="background:#f04452;color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:.8em;cursor:pointer;font-family:inherit;font-weight:600">вЬХ к±∞м†И</button>'
+'</div>';
}else{
actions='<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">'
+(status!=='approved_client'?'<button onclick="approveUser('+u.id+',\'approve_client\')" style="background:#3182f6;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:.75em;cursor:pointer;font-family:inherit">вЖТ кЄ∞мЮ•к±∞лЮШм≤Ш</button>':'')
+(status!=='approved_guest'?'<button onclick="approveUser('+u.id+',\'approve_guest\')" style="background:#00c471;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:.75em;cursor:pointer;font-family:inherit">вЖТ мЭЉл∞ШмКємЭЄ</button>':'')
+(status!=='pending'?'<button onclick="approveUser('+u.id+',\'pending\')" style="background:#8b95a1;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:.75em;cursor:pointer;font-family:inherit">вЖТ лМАкЄ∞л°Ь</button>':'')
+(status!=='rejected'?'<button onclick="rejectUser('+u.id+')" style="background:#f04452;color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:.75em;cursor:pointer;font-family:inherit">вЖТ к±∞м†И</button>':'')
+'</div>';
}
return '<div style="background:#fff;border-radius:12px;padding:16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.03)">'
+'<div style="display:flex;align-items:center;gap:14px">'
+'<div class="avatar">'+av+'</div>'
+'<div class="info"><div class="name">'+e(nm)+(u.name&&u.real_name&&u.name!==u.real_name?' <span style="font-size:.72em;color:#8b95a1">(мєінЖ°: '+e(u.name)+')</span>':'')+'</div>'
+'<div class="meta">'+nameConf+(pv?'<span class="badge">'+pv+'</span> ':'')+e(u.email||'')+phone+'</div>'
+'<div class="meta" style="margin-top:3px">к∞АмЮЕ '+e(u.created_at||'')+' ¬Ј мШ§лКШ '+todayCnt+'к±і</div>'
+'</div></div>'
+actions
+'</div>';
}).join('');
}catch(err){el.innerHTML='<div class="empty">мШ§л•Ш: '+e(err.message)+'</div>'}
}

async function approveUser(id,action){
try{
const r=await fetch('/api/admin-approve?key='+encodeURIComponent(KEY),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:id,action:action})});
const d=await r.json();
if(d.ok){loadUsers(currentStatus);refreshPendingBadge()}
else alert('мЛ§нМ®: '+(d.error||'unknown'));
}catch(err){alert('мШ§л•Ш: '+err.message)}
}

async function rejectUser(id){
const reason=prompt('к±∞м†И мВђмЬ† (мД†нГЭ):','')||null;
try{
const r=await fetch('/api/admin-approve?key='+encodeURIComponent(KEY),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:id,action:'reject',reason:reason})});
const d=await r.json();
if(d.ok){loadUsers(currentStatus);refreshPendingBadge()}
else alert('мЛ§нМ®: '+(d.error||'unknown'));
}catch(err){alert('мШ§л•Ш: '+err.message)}
}

/* ===== к≤Ам¶Э нГ≠ (мЫРк≤© мЬ†мІА) ===== */
let curFilter='pending';
function filt(f){
curFilter=f;
document.getElementById('fltPending').className=f==='pending'?'on':'';
document.getElementById('fltMedium').className=f==='medium'?'on':'';
document.getElementById('fltLow').className=f==='low'?'on':'';
document.getElementById('fltReported').className=f==='reported'?'on':'';
document.getElementById('fltAll').className=f==='all'?'on':'';
loadReview(f);
}

async function loadReview(f){
const el=document.getElementById('reviewList');
el.innerHTML='<div class="empty">л°ЬлФ© м§С...</div>';
try{
const r=await fetch('/api/admin-review?key='+encodeURIComponent(KEY)+'&filter='+f);
const d=await r.json();
if(d.error){el.innerHTML='<div class="empty">'+e(d.error)+'</div>';return}
if(!d.items||d.items.length===0){el.innerHTML='<div class="empty">нХілЛє нХ≠л™© мЧЖмЭМ</div>';return}
if(f==='pending'){
const bg=document.getElementById('reviewBadge');
if(d.items.length>0){bg.style.display='inline-block';bg.textContent=d.items.length}
else bg.style.display='none';
}
el.innerHTML=d.items.map(x=>{
const conf=x.confidence||'лѓЄлґДл•Ш';
const confClass=conf==='лЖТмЭМ'?'high':conf==='л≥інЖµ'?'medium':conf==='лВЃмЭМ'?'low':'medium';
const reportMark=x.reported?' рЯЪ®мЮРлПЩк∞РмІА':'';
return '<div class="review-card" id="card_'+x.id+'">'
+'<div class="r-head"><span>'+e(x.user_name||'лєДл°ЬкЈЄмЭЄ')+'</span> ¬Ј <span>'+e(x.created_at||'')+'</span> <span class="conf '+confClass+'">'+e(conf)+'</span>'+reportMark+'</div>'
+'<div class="r-q">'+e(x.question||'(мІИлђЄ мЧЖмЭМ)').substring(0,200)+'</div>'
+'<div class="r-a">'+e(x.content||'')+'</div>'
+'<div class="r-actions">'
+'<button class="btn-ok" onclick="rev('+x.id+',\'mark_reviewed\')">вЬЕ м†ХлЛµ нЩХмЭЄ</button>'
+'<button class="btn-fix" onclick="rev('+x.id+',\'report_and_review\')">вЪ†пЄП мИШм†ХнХДмЪФ+м≤Шл¶ђмЩДл£М</button>'
+'</div></div>';
}).join('');
}catch(err){el.innerHTML='<div class="empty">мШ§л•Ш: '+e(err.message)+'</div>'}
}

async function bulkReview(){

async function loadList(){
const r=await fetch('/api/conversations?key='+encodeURIComponent(KEY)+'&page=1');
const d=await r.json();
const el=document.getElementById('list');
if(!d.sessions||d.sessions.length===0){el.innerHTML='<div class="empty">лМАнЩФ мЧЖмЭМ</div>';return}
el.innerHTML=d.sessions.map(s=>{
const nm=s.user_name||'лєДл°ЬкЈЄмЭЄ';
const av=s.user_profile_image
?'<img src="'+e(s.user_profile_image)+'" alt="">'
:nm[0];
const pv=s.user_provider||'';
let confBadges='';
if(s.count_high>0)confBadges+='<span class="conf high">лЖТмЭМ '+s.count_high+'</span>';

+'<div class="avatar">'+av+'</div>'
+'<div class="info"><div class="name">'+e(nm)+confBadges+'</div>'
+'<div class="meta">'+(pv?'<span class="badge">'+pv+'</span> ':'')+e(s.last_at||s.started_at||'')+'</div></div>'
+'<div class="right"><div class="cnt">'+s.message_count+'к±і</div></div>'
+'</div>';
}).join('');
}

async function detail(gid){
const r=await fetch('/api/conversation-detail?key='+encodeURIComponent(KEY)+'&session='+encodeURIComponent(gid));
const d=await r.json();
document.getElementById('chatView').style.display='none';
document.getElementById('detailView').style.display='block';
const el=document.getElementById('msgs');
if(!d.messages||d.messages.length===0){el.innerHTML='<div class="empty">л©ФмЛЬмІА мЧЖмЭМ</div>';return}
el.innerHTML=d.messages.filter(m=>m.role==='user'||m.role==='assistant').map(m=>{
let conf='';
if(m.role==='assistant'){
const cm=String(m.content||'').match(/\[мЛ†лҐ∞лПД:\s*(лЖТмЭМ|л≥інЖµ|лВЃмЭМ)/);
if(cm){const c=cm[1];const cls=c==='лЖТмЭМ'?'high':c==='л≥інЖµ'?'medium':'low';conf=' <span class="conf '+cls+'">'+c+'</span>';}
}
return '<div class="msg '+e(m.role)+'">'+e(m.content)+'<div class="ts">'+(m.role==='user'?'мВђмЪ©мЮР':'AI')+conf+' ¬Ј '+e(m.created_at||'')+'</div></div>';
}).join('');
}

async function loadAnalytics(){
const el=document.getElementById('analView');
el.innerHTML='<div class="empty">лґДмДЭ м§С...</div>';
try{
const r=await fetch('/api/analytics?key='+encodeURIComponent(KEY));
const d=await r.json();
if(d.error){el.innerHTML='<div class="empty">'+e(d.error)+'</div>';return}
const s=d.summary;
const mx=Math.max(...d.categories.map(c=>c.count),1);
let h='<div class="stats">'
+'<div class="stat"><div class="n">'+s.total_messages+'</div><div class="l">л©ФмЛЬмІА</div></div>'
+'<div class="stat"><div class="n">'+s.total_sessions+'</div><div class="l">мДЄмЕШ</div></div>'
+'<div class="stat"><div class="n">'+s.total_users+'</div><div class="l">мВђмЪ©мЮР</div></div>'
+'<div class="stat"><div class="n">'+s.total_questions+'</div><div class="l">мІИлђЄ</div></div>'
+'</div>';
h+='<div class="sec">мІИлђЄ мЬ†нШХ</div>';
d.categories.filter(c=>c.count>0).forEach(c=>{
const w=Math.max(c.count/mx*100,4);
h+='<div class="bar-item"><span class="bar-label">'+e(c.name)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+w+'%">'+c.count+'</div></div><span class="bar-cnt">'+c.count+'к±і</span></div>';
});
if(d.topKeywords&&d.topKeywords.length>0){
h+='<div class="sec">мЭЄкЄ∞ нВ§мЫМлУЬ</div><div class="kw-wrap">';
d.topKeywords.forEach(k=>{h+='<span class="kw">'+e(k.keyword)+'<b>'+k.count+'</b></span>'});
h+='</div>';
}
el.innerHTML=h;
}catch(err){el.innerHTML='<div class="empty">мШ§л•Ш</div>'}
}
