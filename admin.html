     모달 26개 + #imgViewer 등은 position:fixed 라 위치 무관 — 같이 들어가도 OK. -->
<div id="adminModalsSlot"></div>

<!-- 모달 lazy load — Phase #1 적용 (2-3 ES module, 2026-05-06):
     이전 인라인 <script> → src/admin/modal-loader.ts 로 옮김.
     main.ts 가 startModalLoader() 자동 호출.
     fallback: window.__loadAdminModals 미존재 시 인라인 fetch 사용. -->
<script>
/* Fallback — main.js (ES module) 로딩 실패 시 즉시 fetch */
setTimeout(function(){
  if(typeof window.__loadAdminModals !== 'function' && !document.getElementById('adminModalsSlot').children.length){
    console.warn('[admin-modals] ES module fallback');
    fetch('/admin-modals.html?v=31', {cache: 'no-cache'})
      .then(r => r.ok ? r.text() : Promise.reject(r.status))
      .then(html => {
        var slot = document.getElementById('adminModalsSlot');
        if(slot) slot.insertAdjacentHTML('beforeend', html);
      })
      .catch(err => console.error('[admin-modals] fetch fail:', err));
  }
}, 800);
</script>

<!-- Phase #7 적용 (2026-05-06): admin-docs.js lazy load.
     문서 탭 클릭 시점에 동적 <script> 추가. 첫 로딩 시 download 0. -->
<script>
(function lazyDocs(){
  var loaded=false;
  function load(){
    if(loaded)return; loaded=true;
    var s=document.createElement('script');
    s.src='/admin-docs.js?v=2&lazy=1';
    s.async=false;
    document.head.appendChild(s);
    if(typeof console!=='undefined' && console.debug) console.debug('[lazy] admin-docs.js loaded');
  }
  function tryHook(){
    if(typeof window.__onTabChange==='function'){
      window.__onTabChange(function(t){
        if(t==='docs') load();
      });
    } else {
      setTimeout(tryHook, 200);
    }
  }
  tryHook();
})();
</script>
<!-- Phase #7 적용 (C 2026-05-06): admin-anal-review-faq.js lazy load 시범.
     초기 로딩 시 안 받음 → 사장님이 anal/review/faq 탭 클릭 시점에 동적 <script> 추가.
     classic script 환경 호환 (var + function 선언 그대로) — fetch + eval 안 쓰고 순수 <script src>. -->
<script>
(function lazyAnalReviewFaq(){
  var loaded=false;
  function load(){
    if(loaded)return; loaded=true;
    var s=document.createElement('script');
    s.src='/admin-anal-review-faq.js?v=2&lazy=1';
    s.async=false;
    document.head.appendChild(s);
    if(typeof console!=='undefined' && console.debug) console.debug('[lazy] admin-anal-review-faq.js loaded');
  }
  function tryHook(){
    if(typeof window.__onTabChange==='function'){
      window.__onTabChange(function(t){
        if(t==='anal'||t==='review'||t==='faq') load();
      });
    } else {
      setTimeout(tryHook, 200);
    }
  }
  tryHook();
})();
</script>

<!-- Phase #2 적용 (2026-05-07): React entry — admin-role-badge-inline 등 mount points 자동 처리.
     classic script 끝난 후 로드 (defer 효과). 사장님 admin.html 전체 로드 후 React 컴포넌트 렌더. -->
<script type="module" src="/assets/react.js?v=3"></script>
