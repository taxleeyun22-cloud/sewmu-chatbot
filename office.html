<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 사무실 OS — 세무회계 이윤</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* 메인 영역 톤 */
  --of-bg:#f5f6f8; --of-card:#fff; --of-border:#e5e8eb;
  --of-text-main:#111827; --of-text-sub:#4b5563; --of-text-mute:#8b95a1;

  /* 브랜드 */
  --of-primary:#3182f6; --of-primary-soft:#e8f3ff; --of-primary-dark:#1f6fdb;

  /* 사이드바 (위멤버스 톤 다크 네이비) */
  --sb-bg:#2b3345;
  --sb-bg-deep:#252b3b;
  --sb-text:#c8d0db;
  --sb-text-mute:#7d8aa0;
  --sb-hover:#36405a;
  --sb-active-bg:#3d4b69;
  --sb-active-text:#ffffff;
  --sb-section:#909bb0;
  --sb-divider:#3a4358;
  --sb-cnt-bg:#1f2535;
  --sb-cnt-text:#9ca7bc;

  /* 상태·D-day */
  --of-overdue:#dc2626; --of-today:#f04452; --of-tomorrow:#fb923c;
  --of-week:#fbbf24; --of-later:#94a3b8;
  --of-success:#10b981; --of-success-soft:#e0f5ec;
  --of-warn:#fbbf24; --of-warn-soft:#fef3c7;
  --of-danger:#dc2626; --of-danger-soft:#fee2e2;

  /* 라운드·그림자 */
  --of-r-sm:5px; --of-r-md:7px; --of-r-lg:10px;
  --of-shadow-sm:0 1px 3px rgba(17,24,39,.06);
  --of-shadow-md:0 4px 12px rgba(17,24,39,.08);
  --of-shadow-lg:0 8px 28px rgba(17,24,39,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--of-bg);color:var(--of-text-main);-webkit-font-smoothing:antialiased;font-size:13px}
body{height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer}

/* ============== 앱 골격 ============== */
.of-app{display:flex;height:100vh;width:100vw;overflow:hidden}

/* ============== 사이드바 (다크 네이비) ============== */
.of-sb{width:236px;flex-shrink:0;background:var(--sb-bg);color:var(--sb-text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.of-sb-brand{padding:16px 16px 14px;display:flex;align-items:center;gap:10px;background:var(--sb-bg-deep);border-bottom:1px solid var(--sb-divider);flex-shrink:0}
.of-sb-brand .back{width:24px;height:24px;border-radius:6px;background:transparent;color:var(--sb-text-mute);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;text-decoration:none;transition:background .12s,color .12s;cursor:pointer}
.of-sb-brand .back:hover{background:var(--sb-hover);color:#fff}
.of-sb-brand .logo{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#3182f6,#5da3ff);display:flex;align-items:center;justify-content:center;font-size:.95em;flex-shrink:0;box-shadow:0 2px 6px rgba(49,130,246,.3)}
.of-sb-brand .name{font-weight:800;font-size:14px;color:#fff;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.of-sb-user{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sb-divider);flex-shrink:0}
.of-sb-user .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3182f6,#5da3ff);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.of-sb-user .who{flex:1;min-width:0;overflow:hidden}
.of-sb-user .who .nm{color:#fff;font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.of-sb-user .who .role{color:var(--sb-text-mute);font-size:11px;margin-top:1px}
.of-sb-user .gear{background:transparent;border:0;color:var(--sb-text-mute);font-size:14px;padding:4px;cursor:pointer;border-radius:5px}
.of-sb-user .gear:hover{background:var(--sb-hover);color:#fff}

.of-sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0 14px}
.of-sb-scroll::-webkit-scrollbar{width:6px}
.of-sb-scroll::-webkit-scrollbar-thumb{background:#3a4358;border-radius:3px}

.of-sb-section{padding:10px 16px 4px;font-size:10.5px;font-weight:700;color:var(--sb-section);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.of-sb-section .arrow{margin-left:auto;font-size:.85em;cursor:pointer;color:var(--sb-text-mute)}

.of-sb-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--sb-text);cursor:pointer;border:0;background:transparent;width:100%;text-align:left;font-family:inherit;transition:background .12s,color .12s;border-left:3px solid transparent}
.of-sb-item:hover{background:var(--sb-hover);color:#fff}
.of-sb-item.on{background:var(--sb-active-bg);color:var(--sb-active-text);border-left-color:var(--of-primary);font-weight:600}
.of-sb-item .ic{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:.92}
.of-sb-item .lb{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.of-sb-item .cnt{background:var(--sb-cnt-bg);color:var(--sb-cnt-text);font-size:11px;font-weight:700;padding:1px 8px;border-radius:99px;flex-shrink:0;min-width:24px;text-align:center;font-variant-numeric:tabular-nums}
.of-sb-item.on .cnt{background:var(--of-primary);color:#fff}
.of-sb-item .star{color:#fbbf24;font-size:11px;flex-shrink:0}
.of-sb-item.alert .cnt{background:#7c2d12;color:#fbbf24}

.of-sb-divider{height:1px;background:var(--sb-divider);margin:10px 14px}

.of-sb-add{padding:8px 16px;font-size:12px;color:var(--of-primary);cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:600}
.of-sb-add:hover{background:var(--sb-hover)}

.of-sb-drive{margin:6px 14px 0;padding:10px 12px;background:var(--sb-bg-deep);border-radius:7px;border:1px solid var(--sb-divider)}
.of-sb-drive-h{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--sb-text);margin-bottom:6px;font-weight:600}
.of-sb-drive-h .pct{color:var(--of-primary);font-weight:800;font-variant-numeric:tabular-nums}
.of-sb-drive-bar{height:5px;background:var(--sb-divider);border-radius:3px;overflow:hidden}
.of-sb-drive-bar .fill{height:100%;width:23%;background:linear-gradient(90deg,var(--of-primary),#5da3ff);border-radius:3px}
.of-sb-drive-meta{font-size:10.5px;color:var(--sb-text-mute);margin-top:6px}

/* 토글 (직원·세무사) */
.of-sb-roletoggle{padding:10px 14px 4px;display:flex;gap:4px;background:var(--sb-bg-deep);border-bottom:1px solid var(--sb-divider);flex-shrink:0}
.of-sb-roletoggle button{flex:1;background:transparent;border:1px solid var(--sb-divider);color:var(--sb-text-mute);padding:6px 4px;font-size:11px;font-weight:700;border-radius:5px}
.of-sb-roletoggle button.on{background:var(--of-primary);color:#fff;border-color:var(--of-primary)}
.of-sb-roletoggle button:hover:not(.on){color:#fff;border-color:var(--sb-text-mute)}

/* ============== 메인 ============== */
.of-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--of-bg)}

/* 메인 헤더 */
.of-mhdr{background:var(--of-card);border-bottom:1px solid var(--of-border);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.of-mhdr-title{flex:1;min-width:0;overflow:hidden;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.of-mhdr-title h1{font-size:17px;font-weight:800;color:var(--of-text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.of-mhdr-title .sub{font-size:13px;color:var(--of-text-mute);font-weight:500}
.of-mhdr-pills{display:flex;gap:8px;flex-shrink:0}
.of-pill{display:inline-flex;align-items:center;gap:6px;background:var(--of-bg);border:1px solid var(--of-border);padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;color:var(--of-text-sub);white-space:nowrap;cursor:pointer;transition:all .15s}
.of-pill:hover{background:var(--of-primary-soft);color:var(--of-primary);border-color:var(--of-primary-soft)}
.of-pill .n{background:var(--of-danger);color:#fff;border-radius:11px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;font-size:10.5px;font-weight:800}
.of-mhdr-date{font-size:12px;color:var(--of-text-mute);font-weight:500;white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.of-mhdr-burger{display:none;background:transparent;border:0;font-size:18px;color:var(--of-text-sub);padding:6px 8px;border-radius:6px}
.of-mhdr-burger:hover{background:var(--of-bg)}

/* 필터 탭 */
.of-tabs{background:var(--of-card);border-bottom:1px solid var(--of-border);padding:8px 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.of-tabs button{background:transparent;border:1px solid transparent;padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;color:var(--of-text-sub);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.of-tabs button:hover{background:var(--of-primary-soft);color:var(--of-primary)}
.of-tabs button.on{background:var(--of-primary);color:#fff}
.of-tabs button.on .cnt{background:rgba(255,255,255,.25);color:#fff}
.of-tabs button .cnt{background:var(--of-bg);color:var(--of-text-mute);font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;min-width:18px;text-align:center}
.of-tabs .sep{flex:1;min-width:8px}
.of-tabs .search{position:relative;display:inline-flex;align-items:center}
.of-tabs .search input{background:var(--of-bg);border:1px solid var(--of-border);border-radius:99px;padding:6px 12px 6px 30px;font-size:12px;font-family:inherit;color:var(--of-text-main);outline:none;width:200px;transition:all .15s}
.of-tabs .search input:focus{border-color:var(--of-primary);background:var(--of-card)}
.of-tabs .search::before{content:"🔍";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.6}

/* KPI (세무사 모드만) */
.of-kpi-bar{display:none;padding:14px 18px;background:var(--of-card);border-bottom:1px solid var(--of-border);flex-shrink:0}
body[data-role="boss"] .of-kpi-bar{display:flex;gap:10px}
.of-kpi-cell{flex:1;background:var(--of-bg);border-radius:var(--of-r-md);padding:12px 14px;display:flex;align-items:center;gap:10px;border-left:3px solid var(--of-primary)}
.of-kpi-cell.processed{border-left-color:var(--of-success)}
.of-kpi-cell.waiting{border-left-color:var(--of-primary)}
.of-kpi-cell.blocked{border-left-color:var(--of-warn)}
.of-kpi-cell.delayed{border-left-color:var(--of-danger)}
.of-kpi-cell .l{font-size:11px;color:var(--of-text-mute);font-weight:600;flex:1}
.of-kpi-cell .n{font-size:22px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.of-kpi-cell.processed .n{color:var(--of-success)}
.of-kpi-cell.waiting .n{color:var(--of-primary)}
.of-kpi-cell.blocked .n{color:#b45309}
.of-kpi-cell.delayed .n{color:var(--of-danger)}

/* 그리드 (엑셀 표) */
.of-grid-wrap{flex:1;min-height:0;overflow:auto;background:var(--of-card);margin:14px 18px 18px;border:1px solid var(--of-border);border-radius:var(--of-r-md)}
.of-grid{width:100%;border-collapse:collapse;font-size:13px}
.of-grid thead th{background:#f9fafb;border-bottom:1px solid var(--of-border);padding:10px 14px;text-align:left;font-size:11.5px;font-weight:700;color:var(--of-text-sub);position:sticky;top:0;z-index:5;letter-spacing:.02em;white-space:nowrap}
.of-grid thead th.checkbox{width:36px;padding-right:0}
.of-grid thead th.sortable{cursor:pointer;user-select:none}
.of-grid thead th.sortable::after{content:"⇅";opacity:.3;margin-left:4px;font-size:10px}
.of-grid tbody tr{border-bottom:1px solid #f1f3f5;cursor:pointer;transition:background .12s}
.of-grid tbody tr:hover{background:#f9fafb}
.of-grid tbody tr.selected{background:var(--of-primary-soft)}
.of-grid tbody tr.selected td:first-child{box-shadow:inset 3px 0 0 var(--of-primary)}
.of-grid tbody td{padding:10px 14px;color:var(--of-text-main);font-size:13px;vertical-align:middle}
.of-grid tbody td.checkbox{padding-right:0}
.of-grid tbody td.checkbox input{cursor:pointer}
.of-grid tbody td .nm{font-weight:700}
.of-grid tbody td .priority{display:inline-block;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:800;text-align:center;line-height:18px;color:#fff;margin-right:4px;flex-shrink:0;vertical-align:middle}
.of-grid tbody td .priority.p1{background:var(--of-danger)}
.of-grid tbody td .priority.p2{background:var(--of-warn);color:#7c2d12}
.of-grid tbody td .priority.p3{background:var(--of-text-mute)}

/* 상태 칩 */
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.chip.pending_filing{background:#fef3c7;color:#92400e}
.chip.in_progress{background:var(--of-primary-soft);color:var(--of-primary)}
.chip.blocked{background:var(--of-danger-soft);color:var(--of-danger)}
.chip.waiting{background:#f1f3f5;color:#6b7684}
.chip.done{background:var(--of-success-soft);color:var(--of-success)}

/* D-day 뱃지 */
.dday{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:800;letter-spacing:.03em;white-space:nowrap;color:#fff}
.dday.today{background:var(--of-today)}
.dday.overdue{background:var(--of-overdue)}
.dday.tomorrow{background:var(--of-tomorrow)}
.dday.week{background:var(--of-week);color:#7c2d12}
.dday.later{background:var(--of-later)}
.dday.none{background:#e5e8eb;color:#6b7684}

.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:700;background:#f1f3f5;color:#6b7684;margin-right:3px}

/* ============== 우측 슬라이드 패널 ============== */
.of-panel-mask{position:fixed;inset:0;background:rgba(17,24,39,.32);z-index:48;opacity:0;pointer-events:none;transition:opacity .25s}
.of-panel-mask.show{opacity:1;pointer-events:auto}
.of-panel{position:fixed;top:0;right:0;bottom:0;width:440px;background:var(--of-card);box-shadow:var(--of-shadow-lg);z-index:50;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,.0,.2,1);display:flex;flex-direction:column}
.of-panel.open{transform:translateX(0)}
.of-panel-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--of-border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0;background:linear-gradient(135deg,#fafbfc,#fff)}
.of-panel-hdr .body{flex:1;min-width:0}
.of-panel-hdr .nm{font-size:18px;font-weight:800;color:var(--of-text-main);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:8px}
.of-panel-hdr .meta{font-size:12px;color:var(--of-text-mute);margin-bottom:8px}
.of-panel-hdr .next{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--of-text-sub);background:var(--of-bg);padding:4px 10px;border-radius:99px;font-weight:600}
.of-panel-hdr .close{background:transparent;border:0;font-size:20px;color:var(--of-text-mute);padding:4px 8px;border-radius:6px;line-height:1}
.of-panel-hdr .close:hover{background:var(--of-bg);color:var(--of-text-main)}

.of-panel-body{flex:1;overflow-y:auto;padding:0 18px 24px}
.of-panel-sec{padding:14px 0;border-bottom:1px solid var(--of-border)}
.of-panel-sec:last-child{border-bottom:0}
.of-panel-sec-h{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--of-text-main);margin-bottom:10px}
.of-panel-sec-h .more{margin-left:auto;background:transparent;border:0;color:var(--of-text-mute);font-size:11px;font-weight:600;padding:0;cursor:pointer}
.of-panel-sec-h .more:hover{color:var(--of-primary)}

/* 일정 */
.task-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--of-border)}
.task-row:last-of-type{border-bottom:0}
.task-row .chk{width:18px;height:18px;border:2px solid var(--of-border);border-radius:5px;flex-shrink:0;cursor:pointer;background:#fff;transition:all .15s}
.task-row.done .chk{background:var(--of-success);border-color:var(--of-success);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.task-row.done .chk::before{content:"✓"}
.task-row .t{flex:1;min-width:0;color:var(--of-text-main);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-row.done .t{color:var(--of-text-mute);text-decoration:line-through}
.task-row .dday{flex-shrink:0}
.add-task{display:flex;gap:6px;margin-top:8px;padding:6px;background:var(--of-bg);border-radius:var(--of-r-sm);border:1px dashed var(--of-border);align-items:center}
.add-task input{flex:1;background:transparent;border:0;outline:none;font-family:inherit;font-size:13px;color:var(--of-text-main);padding:5px 8px;min-width:0}
.add-task input::placeholder{color:var(--of-text-mute)}
.add-task button{background:var(--of-primary);color:#fff;border:0;padding:5px 12px;border-radius:5px;font-size:12px;font-weight:700;flex-shrink:0}

/* 대화 요약 */
.chat-row{padding:10px 12px;background:var(--of-bg);border-radius:var(--of-r-md);margin-bottom:6px;font-size:12.5px;border-left:3px solid var(--of-primary)}
.chat-row.kakao{border-left-color:var(--of-warn)}
.chat-row.app{border-left-color:var(--of-primary)}
.chat-row .src{font-size:10.5px;color:var(--of-text-mute);font-weight:700;margin-bottom:3px;display:flex;justify-content:space-between}
.chat-row .src .ch{color:var(--of-text-sub)}
.chat-row .body{color:var(--of-text-main);line-height:1.45}

/* 자료 */
.file-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:12.5px;border-bottom:1px dashed var(--of-border)}
.file-row:last-of-type{border-bottom:0}
.file-row .ic{font-size:20px;flex-shrink:0;width:32px;height:32px;background:var(--of-bg);border-radius:6px;display:flex;align-items:center;justify-content:center}
.file-row .b{flex:1;min-width:0}
.file-row .b .n{color:var(--of-text-main);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-row .b .m{color:var(--of-text-mute);font-size:11px;margin-top:2px}
.file-row .a{flex-shrink:0;font-size:11px;color:var(--of-primary);font-weight:700;text-decoration:none}

/* 정보 (사업장·재무) */
.info-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px}
.info-row .k{color:var(--of-text-mute)}
.info-row .v{color:var(--of-text-main);font-weight:600;font-variant-numeric:tabular-nums}

/* 패널 푸터 액션 */
.of-panel-actions{flex-shrink:0;padding:12px 18px;border-top:1px solid var(--of-border);background:var(--of-bg);display:flex;gap:8px}
.of-panel-actions button{flex:1;padding:10px;border:0;border-radius:var(--of-r-md);font-size:12px;font-weight:700}
.of-panel-actions .primary{background:var(--of-primary);color:#fff}
.of-panel-actions .primary:hover{background:var(--of-primary-dark)}
.of-panel-actions .ghost{background:var(--of-card);color:var(--of-text-sub);border:1px solid var(--of-border)}
.of-panel-actions .ghost:hover{background:var(--of-bg)}

/* ============== 반응형 ============== */
@media(max-width:1023px){
  .of-sb{position:fixed;top:0;left:0;bottom:0;z-index:60;transform:translateX(-100%);transition:transform .25s}
  .of-sb.open{transform:translateX(0);box-shadow:var(--of-shadow-lg)}
  .of-mhdr-burger{display:inline-block}
  .of-panel{width:420px}
}
@media(max-width:767px){
  body{font-size:12.5px}
  .of-mhdr{padding:10px 12px;gap:8px}
  .of-mhdr-title h1{font-size:15px}
  .of-mhdr-pills{display:none}

<script>
/* ============================================
   더미 데이터 (실데이터 0)
   다음 세션 실 API 연결: /api/admin-rooms·conversations·documents·finance·biz-docs
   사용자 입력값 렌더 시 escAttr 패턴 적용 필수
   ============================================ */

/* Stage B (B-1+B-2): /api/admin-businesses 실데이터 연결.
   sessionStorage admin_key 가 있을 때만 fetch — 미인증 직접 방문은 빈-그리드 안내 유지. */
let STAFF_COUNTS={예슬:0,윤지:0,다현:0,성준:0};
let CLIENTS=[];

const ADMIN_KEY=(typeof sessionStorage!=='undefined' && sessionStorage.getItem('admin_key'))||'';
const BIZ_CACHE=new Map(); /* key=business_id -> { business, members, rooms, financeSummary, schedule } */

const escAttr=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function mapBusinessToClient(b, roomMeta){
  /* businesses.status 3종(active/closed/terminated) + roomMeta(admin-rooms join) → 4-탭 매핑.
     roomMeta = { priority(1|2|3|null), staff, room_count } */
  let status='in_progress';
  if(b.status==='closed') status='done';
  else if(b.status==='terminated') status='blocked';
  /* 신고대기 = 우선순위 1 (사장님 라벨링 기준) — B-4 에서 정확화 */
  if(roomMeta && roomMeta.priority===1 && b.status==='active') status='pending_filing';
  return {
    id:b.id,
    name:b.company_name||'(상호 미기재)',
    owner:b.ceo_name||'—',
    staff:(roomMeta&&roomMeta.staff)||'—',
    status,
    pri:(roomMeta&&roomMeta.priority)||3,
    next:b.fiscal_year_end||'—', /* 정확한 다음 신고일 계산은 후속 (filing schedule API) */
    dday:null,
    biz:b.industry||b.business_category||'—',
    tax:b.tax_type||'—',
    room_count:(roomMeta&&roomMeta.room_count)||(b.room_count||0),
    member_count:b.member_count||0
  };
}

function buildRoomMeta(rooms){
  /* business_id → 가장 우선순위 높은(priority 작은) room 의 메타 추출 */
  const map=new Map();
  for(const r of (rooms||[])){
    if(!r.business_id) continue;
    const cur=map.get(r.business_id);
    const p=(r.priority==null?99:r.priority);
    if(!cur || p<cur._p){
      map.set(r.business_id,{
        _p:p,
        priority:r.priority||null,
        staff:r.first_member_name||null,
        room_count:1
      });
    }else{
      cur.room_count+=1;
    }
  }
  /* room_count 누적 보정: 위 로직이 첫 hit 만 1 로 시작하니 다시 한 번 — 간단히 별도 카운트 */
  const counts=new Map();
  for(const r of (rooms||[])){
    if(!r.business_id) continue;
    counts.set(r.business_id,(counts.get(r.business_id)||0)+1);
  }
  for(const [k,v] of map){ v.room_count=counts.get(k)||0; }
  return map;
}

function pickPrimaryUser(members){
  if(!Array.isArray(members)||!members.length) return null;
  return members.find(m=>m.is_primary===1&&m.role==='대표자')
       ||members.find(m=>m.is_primary===1)
       ||members.find(m=>m.role==='대표자')
       ||members[0]||null;
}

  }
};

/* ============== fetch (Stage B) ============== */
async function fetchClients(){
  if(!ADMIN_KEY){ renderEmptyState('unauth'); return; }
  setLiveBadge('connecting');
  renderEmptyState('loading');
  const k=encodeURIComponent(ADMIN_KEY);
  try{
    const [bizRes,roomsRes]=await Promise.all([
      fetch('/api/admin-businesses?key='+k,{credentials:'omit'}),
      fetch('/api/admin-rooms?key='+k,{credentials:'omit'})
    ]);
    if(bizRes.status===401){ setLiveBadge('offline'); renderEmptyState('unauth'); return; }
    if(!bizRes.ok){ setLiveBadge('error'); renderEmptyState('error'); return; }
    const bizData=await bizRes.json();
    if(!bizData||bizData.ok===false){ setLiveBadge('error'); renderEmptyState('error'); return; }
    /* admin-rooms 실패는 치명적 X — priority/staff 만 비고 그리드는 채움 */
    let roomMetaMap=new Map();
    if(roomsRes.ok){
      try{
        const roomsData=await roomsRes.json();
        roomMetaMap=buildRoomMeta(roomsData.rooms||[]);
      }catch(_){}
    }
    CLIENTS=(bizData.businesses||[]).map(b=>mapBusinessToClient(b,roomMetaMap.get(b.id)));
    recomputeStaffCounts();
    setLiveBadge('live');
    renderSbStaff();
    renderGrid();
    renderSbCounts();
  }catch(_){
    setLiveBadge('error');
    renderEmptyState('error');
  }
}

async function fetchPanelData(id){
  if(!ADMIN_KEY) return null;
  const k=encodeURIComponent(ADMIN_KEY);
  try{
    const [bizRes,finRes,schedRes]=await Promise.all([
      fetch('/api/admin-businesses?id='+id+'&key='+k,{credentials:'omit'}),
      fetch('/api/admin-finance?action=summary&business_id='+id+'&key='+k,{credentials:'omit'}),
      fetch('/api/memos?scope=business_due&business_id='+id+'&key='+k,{credentials:'omit'})
    ]);
    if(bizRes.status===401||finRes.status===401||schedRes.status===401) return null;
    const bizJson = bizRes.ok ? await bizRes.json().catch(()=>null) : null;
    const finJson = finRes.ok ? await finRes.json().catch(()=>null) : null;
    const schedJson = schedRes.ok ? await schedRes.json().catch(()=>null) : null;
    if(!bizJson||bizJson.ok===false) return null;
    const payload={
      business: bizJson.business||null,
      members: bizJson.members||[],
      rooms: bizJson.rooms||[],
      financeSummary: finJson||null,
      schedule: (schedJson&&schedJson.schedule)||[]
    };
    BIZ_CACHE.set(id,payload);
    return payload;
  }catch(_){
    return null;
  }
}

function setLiveBadge(state){
  const el=document.getElementById('liveBadge');
  if(!el) return;
  const map={
    connecting:{t:'CONNECTING',bg:'#e5e8eb',fg:'#4e5968'},
    live:{t:'LIVE',bg:'#dcfce7',fg:'#166534'},
    offline:{t:'OFFLINE',bg:'#e5e8eb',fg:'#8b95a1'},
    error:{t:'ERROR',bg:'#fee2e2',fg:'#991b1b'}
  };
  const cfg=map[state]||map.offline;
  el.textContent=cfg.t;
  el.style.background=cfg.bg;
  el.style.color=cfg.fg;
}

function recomputeStaffCounts(){
  /* CLIENTS 의 staff 필드 → STAFF_COUNTS 자동 집계.
     기본 4명(예슬/윤지/다현/성준) 기준으로 0 초기화 후 카운팅. 알 수 없는 staff 는 무시 */
  STAFF_COUNTS={예슬:0,윤지:0,다현:0,성준:0};
  for(const c of CLIENTS){
    if(c.staff && c.staff!=='—' && (c.staff in STAFF_COUNTS)){
      STAFF_COUNTS[c.staff]+=1;
    }
  }
}

function renderSbCounts(){
  /* 사이드바 거래처 메뉴 카운트 (전체 / 내 담당 / 미지정) */
  const all=CLIENTS.length;
  const mineKey=document.body.dataset.role==='staff'?'예슬':null; /* boss 는 전체를 '내 담당' 으로 — 사장님 입장 */
  const mine=mineKey?CLIENTS.filter(c=>c.staff===mineKey).length:all;
  const unassigned=CLIENTS.filter(c=>!c.staff||c.staff==='—').length;
  const $=document.getElementById.bind(document);
  if($('sbCntAll')) $('sbCntAll').textContent=all;
  if($('sbCntMine')) $('sbCntMine').textContent=mine;
  if($('sbCntUnassigned')) $('sbCntUnassigned').textContent=unassigned;
}

function renderEmptyState(reason){
  const msg={
    unauth:{ic:'🔒',h:'관리자에서 진입해 주세요',s:'좌상단 ← 돌아가기 또는 admin.html 에서 다시 진입.'},
    loading:{ic:'⏳',h:'거래처 목록을 불러오는 중…',s:''},
    error:{ic:'⚠️',h:'거래처 목록을 불러오지 못했습니다',s:'잠시 후 다시 시도해 주세요.'},
    empty:{ic:'🏢',h:'등록된 거래처가 없습니다',s:''}
  }[reason]||{ic:'🏢',h:'거래처 데이터 연결 준비 중',s:''};
  const body=document.getElementById('gridBody');
  if(!body) return;
  body.innerHTML=`
    <tr><td colspan="9" style="padding:60px 20px;text-align:center;color:var(--of-text-mute)">
      <div style="font-size:36px;margin-bottom:12px">${msg.ic}</div>
      <div style="font-weight:700;color:var(--of-text-main);margin-bottom:4px">${msg.h}</div>
      ${msg.s?`<div style="font-size:12px">${msg.s}</div>`:''}
    </td></tr>`;
  document.getElementById('cntAll').textContent='0';
}

/* ============== 렌더 ============== */
const $=id=>document.getElementById(id);
const STATUS_LABEL={pending_filing:'신고대기',in_progress:'진행',blocked:'막힘',waiting:'대기',done:'완료'};
const DDAY_LABEL={overdue:'지남',today:'D-DAY',tomorrow:'D-1',week:'D-3',later:'D-7+'};

let currentFilter='mine';
let currentStatus='all';
let currentSearch='';
let selectedRow=null;

/* 사이드바 직원 목록 */
function renderSbStaff(){
  const isStaffMode=document.body.dataset.role==='staff';

      <button class="of-sb-item on" data-filter="staff:예슬" type="button">

        <span class="ic">${i===0?'⭐':'👤'}</span><span class="lb">${n}</span><span class="cnt">${c}</span>
      </button>
    `).join('');
    $('sbAddStaff').style.display='flex';
    $('sbSecStaff').firstChild.textContent='담당자별 ';
  }
}

/* 그리드 */
function applyFilter(){
  let rows=CLIENTS.slice();
  if(currentStatus!=='all') rows=rows.filter(r=>r.status===currentStatus);
  if(currentSearch.trim()){
    const q=currentSearch.trim().toLowerCase();
    rows=rows.filter(r=>r.name.toLowerCase().includes(q)||r.owner.toLowerCase().includes(q));
  }
  return rows;
}

function renderGrid(){
  const rows=applyFilter();
  if(!rows.length){
    $('gridBody').innerHTML=`
      <tr><td colspan="9" style="padding:60px 20px;text-align:center;color:var(--of-text-mute)">
        <div style="font-size:36px;margin-bottom:12px">🏢</div>
        <div style="font-weight:700;color:var(--of-text-main);margin-bottom:4px">거래처 데이터 연결 준비 중</div>
        <div style="font-size:12px">Stage B 에서 사장님 실제 거래처 (사용자·업체) 가 여기 표시됩니다.</div>
      </td></tr>
    `;
  }else{
    $('gridBody').innerHTML=rows.map(r=>`
      <tr data-id="${r.id}">
        <td class="checkbox"><input type="checkbox" aria-label="선택"></td>
        <td><span class="priority p${r.pri}">${r.pri}</span><span class="nm">${r.name}</span></td>
        <td>${r.owner}</td>
        <td>${r.staff}</td>
        <td><span class="chip ${r.status}">${STATUS_LABEL[r.status]}</span></td>
        <td>${r.next}</td>
        <td>${r.dday?`<span class="dday ${r.dday}">${DDAY_LABEL[r.dday]}</span>`:`<span class="dday none">—</span>`}</td>
        <td><span class="tag">${r.biz}</span></td>
        <td>${r.tax}</td>
      </tr>
    `).join('');
  }

  /* 카운트 */
  $('cntAll').textContent=CLIENTS.length;
  $('cntPF').textContent=CLIENTS.filter(r=>r.status==='pending_filing').length;
  $('cntIP').textContent=CLIENTS.filter(r=>r.status==='in_progress').length;
  $('cntBL').textContent=CLIENTS.filter(r=>r.status==='blocked').length;
  $('cntDN').textContent=CLIENTS.filter(r=>r.status==='done').length;

  /* 헤더 서브 텍스트 */
  const isStaff=document.body.dataset.role==='staff';
  $('mhdrSub').textContent=isStaff?`예슬 담당 ${rows.length}개`:`전체 ${rows.length}개`;
}

/* 패널 (Stage B: PANEL_DATA[1] 재사용 버그 픽스, 진짜 fetch) */
async function openPanel(id){
  const c=CLIENTS.find(x=>x.id===id);
  if(!c) return;

  /* 헤더는 그리드 row 데이터로 즉시 채움 */
  $('pNm').innerHTML=`<span class="priority p${c.pri}" style="display:inline-block;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:800;text-align:center;line-height:20px;color:#fff;${c.pri===1?'background:var(--of-danger)':c.pri===2?'background:var(--of-warn);color:#7c2d12':'background:var(--of-text-mute)'}">${c.pri}</span> ${escAttr(c.name)}`;
  $('pMeta').textContent=`${c.owner} · ${c.biz} · ${c.tax} · 담당 ${c.staff}`;
  $('pNext').innerHTML=`📅 다음 신고: <b style="color:var(--of-text-main);margin-left:4px">${escAttr(c.next)}</b>`;

  $('panel').classList.add('open');
  $('panel').setAttribute('aria-hidden','false');
  $('panelMask').classList.add('show');

  /* 캐시 히트 → 즉시 렌더 */
  const cached=BIZ_CACHE.get(id);
  if(cached){ renderPanelBody(cached); return; }

  /* 미스 → 5섹션 placeholder → fetch → 교체 */
  $('pBody').innerHTML=`
    <div class="of-panel-sec"><div class="of-panel-sec-h">📋 일정 / 할 일</div><div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">불러오는 중…</div></div>
    <div class="of-panel-sec"><div class="of-panel-sec-h">💬 상담방</div><div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">불러오는 중…</div></div>
    <div class="of-panel-sec"><div class="of-panel-sec-h">📦 받은 자료</div><div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">불러오는 중…</div></div>
    <div class="of-panel-sec"><div class="of-panel-sec-h">💼 사업장 정보</div><div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">불러오는 중…</div></div>
    <div class="of-panel-sec"><div class="of-panel-sec-h">📊 최근 재무</div><div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">불러오는 중…</div></div>
  `;
  const payload=await fetchPanelData(id);
  /* 사용자가 그 사이 다른 거래처 클릭했을 가능성 — 현재 선택된 row 가 같은지 확인 */
  if(selectedRow && parseInt(selectedRow.dataset.id)!==id) return;
  renderPanelBody(payload);
}

function renderPanelBody(payload){
  if(!payload){
    $('pBody').innerHTML=`
      <div class="of-panel-sec">
        <div class="of-panel-sec-h">정보 없음</div>
        <div style="padding:16px;color:var(--of-text-mute);font-size:13px">
          거래처 상세 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.
        </div>
      </div>`;
    return;
  }
  const business=payload.business||{};
  const rooms=payload.rooms||[];
  const schedule=payload.schedule||[];
  const finRows=(payload.financeSummary&&payload.financeSummary.rows)||[];
  const finHasData=!!(payload.financeSummary&&payload.financeSummary.has_data);

  const tasksOpen=schedule.filter(s=>!s.deleted_at);
  const fmtMoney=v=>v==null?'—':Number(v).toLocaleString('ko-KR')+'원';
  const fmtDday=due=>{
    if(!due) return '';
    try{
      const d=new Date(due+'T00:00:00');
      const today=new Date(); today.setHours(0,0,0,0);
      const diff=Math.round((d-today)/(1000*60*60*24));
      if(diff<0) return `<span class="dday overdue">D+${-diff}</span>`;
      if(diff===0) return `<span class="dday today">D-DAY</span>`;
      if(diff===1) return `<span class="dday tomorrow">D-1</span>`;
      if(diff<=7) return `<span class="dday week">D-${diff}</span>`;
      return `<span class="dday later">D-${diff}</span>`;
    }catch(_){ return ''; }
  };

  $('pBody').innerHTML=`
    <div class="of-panel-sec">
      <div class="of-panel-sec-h">📋 일정 / 할 일 <span style="color:var(--of-text-mute);font-weight:500;font-size:11px">(${tasksOpen.length})</span></div>
      ${tasksOpen.length?tasksOpen.slice(0,8).map(t=>`
        <div class="task-row">
          <div class="chk"></div>
          <div class="t">${escAttr(t.content||'')}</div>
          ${fmtDday(t.due_date)}
        </div>
      `).join(''):'<div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">등록된 할 일 없음</div>'}
    </div>

    <div class="of-panel-sec">
      <div class="of-panel-sec-h">💬 상담방 <span style="color:var(--of-text-mute);font-weight:500;font-size:11px">(${rooms.length}개 연결)</span></div>
      ${rooms.length?rooms.slice(0,5).map(r=>`
        <div class="chat-row app">
          <div class="src"><span class="ch">${escAttr(r.name||'상담방')}</span><span>${escAttr(r.created_at||'')}</span></div>
          <div class="body">상태: ${escAttr(r.status||'진행중')}</div>
        </div>
      `).join(''):'<div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">연결된 상담방 없음</div>'}
    </div>

    <div class="of-panel-sec">
      <div class="of-panel-sec-h">📦 받은 자료 <span style="color:var(--of-text-mute);font-weight:500;font-size:11px">(Drive)</span></div>
      <div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">파일 목록은 후속 단계 (B-3) 에서 admin-biz-docs 연동 예정입니다.</div>
    </div>

    <div class="of-panel-sec">
      <div class="of-panel-sec-h">💼 사업장 정보</div>
      ${[
        ['사업자번호',business.business_number],
        ['대표자',business.ceo_name],
        ['업종',business.industry||business.business_category],
        ['과세유형',business.tax_type],
        ['개업일',business.establishment_date]
      ].map(([k,v])=>`<div class="info-row"><span class="k">${k}</span><span class="v">${escAttr(v||'—')}</span></div>`).join('')}
    </div>

    <div class="of-panel-sec">
      <div class="of-panel-sec-h">📊 최근 재무</div>
      ${finHasData&&finRows.length?finRows.slice(0,4).map(r=>`
        <div class="info-row"><span class="k">${escAttr(r.period||'')} 매출</span><span class="v">${fmtMoney(r.revenue)}</span></div>
      `).join(''):'<div style="padding:12px 16px;color:var(--of-text-mute);font-size:12px">재무 데이터 없음</div>'}
    </div>
  `;
}

function closePanel(){
  $('panel').classList.remove('open');
  $('panel').setAttribute('aria-hidden','true');
  $('panelMask').classList.remove('show');
  if(selectedRow){selectedRow.classList.remove('selected');selectedRow=null}
}

/* ============== 모드 토글 ============== */
function setRole(role){
  document.body.dataset.role=role;
  $('btnStaff').classList.toggle('on',role==='staff');
  $('btnBoss').classList.toggle('on',role==='boss');
  $('sbName').textContent=role==='staff'?'예슬':'이재윤';
  $('sbAvatar').textContent=role==='staff'?'예':'이';
  $('sbRole').textContent=role==='staff'?'담당 직원':'세무사 (사장님)';
  const u=new URL(location.href);
  u.searchParams.set('role',role);
  history.replaceState(null,'',u);
  /* 돌아가기 링크 동기화 */
  const back=$('backToAdmin');
  if(back){
    back.href=role==='staff'?'/staff.html':'/admin.html';
    back.title=role==='staff'?'직원 화면으로 돌아가기':'관리자 화면으로 돌아가기';
  }
  renderSbStaff();
  renderSbCounts();
  renderGrid();
}

/* ============== 이벤트 ============== */
$('btnStaff').addEventListener('click',()=>setRole('staff'));
$('btnBoss').addEventListener('click',()=>setRole('boss'));

document.querySelectorAll('.of-tabs button[data-status]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.of-tabs button[data-status]').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    currentStatus=b.dataset.status;
    renderGrid();
  });
});

$('searchBox').addEventListener('input',e=>{
  currentSearch=e.target.value;
  renderGrid();
});

/* 사이드바 클릭 (이벤트 위임) */
$('sidebar').addEventListener('click',e=>{
  const it=e.target.closest('.of-sb-item');
  if(!it||!it.dataset.filter) return;
  const grp=it.parentElement;
  /* 같은 그룹 안에서만 활성 토글 (메뉴 항목 vs 담당자 항목 구분 단순화: 모두 풀어 데이터 그룹 단위로 갱신) */
  document.querySelectorAll('.of-sb-item[data-filter^="staff:"]').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.of-sb-item[data-filter="mine"],.of-sb-item[data-filter="all"],.of-sb-item[data-filter="unassigned"]').forEach(x=>x.classList.remove('on'));
  it.classList.add('on');
  currentFilter=it.dataset.filter;
  renderGrid();
});

/* 그리드 행 클릭 */
$('gridBody').addEventListener('click',e=>{
  if(e.target.closest('input[type="checkbox"]')) return;
  const tr=e.target.closest('tr[data-id]');
  if(!tr) return;
  if(selectedRow) selectedRow.classList.remove('selected');
  tr.classList.add('selected');
  selectedRow=tr;
  openPanel(parseInt(tr.dataset.id));
});

/* 패널 닫기 */
$('pClose').addEventListener('click',closePanel);
$('panelMask').addEventListener('click',closePanel);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&$('panel').classList.contains('open')) closePanel();
});

/* 모바일 햄버거 */
$('burger').addEventListener('click',()=>{
  $('sidebar').classList.toggle('open');
});
document.addEventListener('click',e=>{
  if(window.innerWidth>=1024) return;
  if(!$('sidebar').classList.contains('open')) return;
  if(e.target.closest('#sidebar')||e.target.closest('#burger')) return;
  $('sidebar').classList.remove('open');
});

/* ============== 초기 ============== */
const initRole=new URLSearchParams(location.search).get('role')==='boss'?'boss':'staff';
setRole(initRole);
setLiveBadge(ADMIN_KEY?'connecting':'offline');
if(ADMIN_KEY){ fetchClients(); } else { renderEmptyState('unauth'); }
</script>

</body>
</html>
