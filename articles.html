<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세무 칼럼 - 세무회계 이윤</title>
<meta name="description" content="대구 달서구 세무회계 이윤의 세무 칼럼. 종합소득세, 부가세, 상속세, 증여세 등 세무 정보를 알기 쉽게 안내합니다.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;background:#fff;color:#222;-webkit-font-smoothing:antialiased}

/* 헤더 */
.header{border-bottom:1px solid #eee;padding:16px 0}
.header-inner{max-width:680px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:14px}
.header img{height:32px}
.header-text h1{font-size:.95em;font-weight:700;color:#111}
.header-text p{font-size:.65em;color:#aaa;font-weight:400;margin-top:1px}
.chat-link{margin-left:auto;color:#007aff;font-size:.8em;text-decoration:none;font-weight:500}

/* 메인 */
.main{max-width:680px;margin:0 auto;padding:48px 24px 100px}
.page-title{font-size:2em;font-weight:900;color:#111;letter-spacing:-.5px;margin-bottom:4px}
.page-subtitle{font-size:.85em;color:#aaa;font-weight:400;margin-bottom:40px;padding-bottom:24px;border-bottom:2px solid #111}

/* 글 목록 */
.article-item{padding:28px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:.15s}
.article-item:hover .item-title{color:#007aff}
.article-item:first-child{padding-top:0}
.item-cat{font-size:.7em;color:#007aff;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.item-title{font-size:1.2em;font-weight:700;color:#111;line-height:1.45;margin-bottom:8px;letter-spacing:-.3px;transition:.15s}
.item-preview{font-size:.88em;color:#888;line-height:1.6;font-weight:300}
.item-date{font-size:.72em;color:#ccc;margin-top:8px;font-weight:400}

/* 글 상세 */
.article-view{display:none}
.back-btn{background:none;border:none;color:#007aff;cursor:pointer;font-size:.85em;padding:0;font-weight:500;margin-bottom:32px;font-family:inherit}
.back-btn:hover{text-decoration:underline}
.view-cat{font-size:.7em;color:#007aff;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.view-title{font-size:1.8em;font-weight:900;color:#111;line-height:1.35;margin-bottom:12px;letter-spacing:-.5px}
.view-meta{font-size:.8em;color:#bbb;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid #f0f0f0;font-weight:400}
.view-meta .author{color:#666;font-weight:500}

/* 본문 스타일 */
.body{font-size:.95em;line-height:1.85;color:#333;font-weight:300}
.body h2{font-size:1.25em;color:#111;margin:36px 0 14px;font-weight:700;letter-spacing:-.3px}
.body h3{font-size:1.05em;color:#111;margin:28px 0 10px;font-weight:700}
.body p{margin:12px 0;line-height:1.85}
.body ul,.body ol{margin:14px 0 14px 20px;line-height:2}
.body li{color:#444;font-weight:300}
.body blockquote{background:#f8f9fa;border-left:3px solid #007aff;padding:16px 20px;margin:20px 0;color:#555;font-size:.9em;line-height:1.7;border-radius:0 6px 6px 0}
.body table{width:100%;border-collapse:collapse;margin:20px 0;font-size:.88em}
.body th{background:#111;color:#fff;padding:10px 14px;text-align:left;font-weight:500;font-size:.85em}
.body td{padding:9px 14px;border-bottom:1px solid #f0f0f0;color:#444;font-weight:300}
.body tr:last-child td{border-bottom:none}
.body hr{border:none;border-top:1px solid #f0f0f0;margin:28px 0}
.body .example-box{background:#f8fbff;border:1px solid #e4edfa;border-radius:8px;padding:20px;margin:20px 0}
.body .example-box strong{color:#111;font-weight:700}
.body .law-ref{background:#f8f9fa;border-radius:6px;padding:14px 18px;margin-top:32px;font-size:.82em;color:#007aff;font-weight:400}

/* 푸터 */
.footer{text-align:center;padding:32px 24px;color:#ccc;font-size:.75em;border-top:1px solid #f0f0f0;margin-top:48px}
.footer a{color:#aaa;text-decoration:none}

.empty{text-align:center;color:#ccc;padding:80px 20px;font-weight:300}

@media(max-width:600px){
    .main{padding:32px 18px 60px}
    .page-title{font-size:1.5em}
    .item-title{font-size:1.05em}
    .view-title{font-size:1.4em}
    .body{font-size:.9em}
}
</style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <a href="/"><img src="logo.png" alt="세무회계 이윤"></a>
        <div class="header-text">
            <h1>세무 칼럼</h1>
            <p>Tax Column</p>
        </div>
        <a href="/" class="chat-link">AI 상담</a>
    </div>
</div>

<div class="main">
    <div id="listView">
        <div class="page-title">세무 칼럼</div>
        <div class="page-subtitle">대표세무사 이재윤</div>
        <div id="articleList"></div>
    </div>

    <div id="detailView" class="article-view">
        <button class="back-btn" onclick="showList()">← 목록</button>
        <div class="view-cat" id="viewCategory"></div>
        <div class="view-title" id="viewTitle"></div>
        <div class="view-meta"><span class="author">세무회계 이윤</span> · <span id="viewDate"></span></div>
        <div class="body" id="viewBody"></div>
        <div class="footer">
            <p>세무회계 이윤 · 대구광역시 달서구 와룡로 221 4층</p>
            <p style="margin-top:4px"><a href="tel:053-269-1213">053-269-1213</a></p>
        </div>
    </div>
</div>

<script>
async function loadList() {
    const res = await fetch("/articles/index.json");
    const articles = await res.json();
    const list = document.getElementById("articleList");
    if (!articles || articles.length === 0) {
        list.innerHTML = '<div class="empty">준비 중입니다.</div>';
        return;
    }
    list.innerHTML = "";
    for (const a of articles) {
        const div = document.createElement("div");
        div.className = "article-item";
        div.innerHTML = `<div class="item-cat">${a.category}</div><div class="item-title">${a.title}</div><div class="item-preview">${a.preview || ""}</div><div class="item-date">${a.date}</div>`;
        div.onclick = () => showDetail(a.file, a.title, a.category, a.date);
        list.appendChild(div);
    }
}
async function showDetail(file, title, category, date) {
    const res = await fetch("/articles/" + file);
    const text = await res.text();
    document.getElementById("viewCategory").textContent = category;
    document.getElementById("viewTitle").textContent = title;
    document.getElementById("viewDate").textContent = date;
    document.getElementById("viewBody").innerHTML = text;
    document.getElementById("listView").style.display = "none";
    document.getElementById("detailView").style.display = "block";
    window.scrollTo(0, 0);
}
function showList() {
    document.getElementById("listView").style.display = "block";
    document.getElementById("detailView").style.display = "none";
    window.scrollTo(0, 0);
}
loadList();
</script>
</body>
</html>
