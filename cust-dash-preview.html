<style>

  .nav-btn{padding:7px 14px;font-size:13px;font-weight:500;border:1px solid var(--border-2);border-radius:8px;background:#fff;color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit}

  .nav-btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}

  .container{max-width:1280px;margin:0 auto;padding:40px}

  @media(max-width:920px){.grid{grid-template-columns:1fr}.container{padding:20px}.hero{flex-direction:column;align-items:flex-start;gap:16px}.hero-name{font-size:30px}}

<!-- admin.js 헬퍼 shim (admin-memos.js 의존: KEY/$g/e/escAttr/_cdCurrentUserId/_normType) -->
<script>
(function(){
  var p=new URLSearchParams(location.search);
  window.KEY = window.KEY || p.get('key') || '';
  try{ if(!window.KEY) window.KEY = sessionStorage.getItem('ADMIN_KEY')||localStorage.getItem('ADMIN_KEY')||''; }catch(_){}
  window.$g = window.$g || function(id){ return document.getElementById(id); };
  window.e = window.e || function(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];}); };
  window.escAttr = window.escAttr || window.e;
  var _MAP={'확인필요':'할 일','고객요청':'할 일','메모':'거래처 정보'};
  window._normType = window._normType || function(t){ return _MAP[t]||t||'거래처 정보'; };
  window._TARGET_USER_ID = parseInt(p.get('user_id')||p.get('id')||'0',10);
  window._cdCurrentUserId = window._TARGET_USER_ID;
})();
</script>

  function dstr(s){ return s?String(s).substring(0,10).replace(/-/g,'.'):''; }

  if(!UID){ $('heroName').textContent='?user_id=N 필요'; return; }

  var ACT=[]; /* 최근활동 합성 누적 */
  function pushAct(text,ts,active){ if(text&&ts) ACT.push({text:text,ts:ts,active:!!active}); }
  function renderActivity(){
    ACT.sort(function(a,b){ return String(b.ts).localeCompare(String(a.ts)); });
    var box=$('activityBox'); if(!box) return;
    if(!ACT.length){ box.innerHTML='<div style="color:var(--text-3);font-size:13px">활동 없음</div>'; return; }
    box.innerHTML=ACT.slice(0,12).map(function(a,i){
      var when=relTime(a.ts);
      return '<div class="tl-item"><div class="tl-dot'+(i===0?' active':'')+'"></div><div class="tl-content"><div class="tl-text">'+E(a.text)+'</div><div class="tl-time">'+E(when)+'</div></div></div>';
    }).join('');
  }
  function relTime(ts){
    try{
      var d=new Date(String(ts).replace(' ','T')); var diff=(Date.now()-d.getTime())/1000;
      if(diff<60) return '방금 전';
      if(diff<3600) return Math.floor(diff/60)+'분 전';
      if(diff<86400) return Math.floor(diff/3600)+'시간 전';
      return dstr(ts);
    }catch(_){ return dstr(ts); }
  }

  /* 1) 기본정보 + Hero (admin-approve status=all → find by id) */
  api('admin-approve?status=all').then(function(d){
    var u=((d&&(d.users||d.list))||[]).find(function(x){return Number(x.id)===UID;})||{};
    var nm=u.real_name||u.name||('#'+UID);
    $('heroName').textContent=nm; $('bcName').textContent=nm;
    document.title='거래처 상세 (프리뷰) — '+nm;
    $('heroLabel').textContent = u.is_admin?'관리자':'거래처';
    var meta=[];
    if(u.phone) meta.push('<span>'+E(u.phone)+'</span>');
    if(u.email) meta.push('<span>'+E(u.email)+'</span>');
    var join=dstr(u.created_at);
    var metaHtml=meta.join('<span class="dot"></span>')+(join?'<span class="tag">'+join+' 가입</span>':'');
    $('heroMeta').innerHTML=metaHtml||'<span style="color:var(--text-3)">정보 없음</span>';
    $('basicBox').innerHTML=
      row('이름',nm)+row('생년월일',u.birth_date||u.birthday||'—')+
      row('연락처',u.phone||'<span style="color:var(--amber)">미등록</span>')+
      row('가입일',join||'—')+row('담당자',u.created_by||u.assigned_to||'—');
    pushAct('거래처 등록', u.created_at, false);
    renderActivity();
  });
  function row(k,v){ return '<div class="info-row"><span class="k">'+E(k)+'</span><span class="v">'+v+'</span></div>'; }

  /* 2) 연결된 사업장 + 서류 status */
  api('admin-biz-docs?user_id='+UID).then(function(d){
    var list=(d&&d.businesses)||[]; var box=$('bizBox');
    if(!list.length){ box.innerHTML='<div class="side-body" style="color:var(--text-3);font-size:13px">연결된 사업장 없음</div>'; return; }
    box.innerHTML=list.map(function(b){
      var docHtml=['신분증','사업자등록증','홈택스 인증'].map(function(lbl,ix){
        var keys=[['id_card','idcard','has_id'],['biz_reg','business_reg','has_biz_reg'],['hometax','has_hometax']][ix];
        var ok=keys.some(function(k){return b[k];});
        return '<div class="doc-row"><span class="name">'+E(lbl)+'</span><span class="doc-status '+(ok?'ok':'warn')+'">'+(ok?'등록':'미등록')+'</span></div>';
      }).join('');
      var fy=(b.fiscal_year_start||b.accounting_start)&&(b.fiscal_year_end||b.accounting_end)
        ? '<div style="font-size:12px;color:var(--text-3);padding-top:8px;border-top:1px dashed var(--border)">회계기간 '+dstr(b.fiscal_year_start||b.accounting_start)+' — '+dstr(b.fiscal_year_end||b.accounting_end)+'</div>' : '';
      pushAct('사업장 「'+(b.company_name||'')+'」 연결', b.linked_at||b.created_at, false);
      return '<div style="padding:16px 18px;border-bottom:1px solid var(--border)">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
        +'<div><div style="font-size:14px;font-weight:600;margin-bottom:4px">'+E(b.company_name||'(이름없음)')+'</div>'
        +'<div style="font-size:12px;color:var(--text-3)">'+E([b.business_number||'',b.company_form||''].filter(Boolean).join(' · '))+'</div></div>'
        +(b.is_primary?'<span class="badge navy">주업장</span>':'')+'</div>'+fy+'</div>'
        +'<div class="docs">'+docHtml+'</div>';
    }).join('');
    renderActivity();
  });

  /* 3) 신고 검토표 case (Person owner) */
  api('admin-filings?owner_type=Person&owner_id='+UID).then(function(d){
    var list=(d&&(d.filings||d.list||d.cases))||[]; var box=$('filList');
    $('filCount').textContent=list.length;
    if(!list.length){ box.innerHTML='<div class="empty-case">신고 Case 없음 — ＋ 새 Case 로 생성</div>'; return; }
    box.innerHTML=list.map(function(f){
      var af={}; try{ af=typeof f.auto_fields==='string'?JSON.parse(f.auto_fields):(f.auto_fields||{}); }catch(_){}
      var ty=(f.type||'').replace('종합소득세','종').replace('법인세','법').replace('부가세','부')||'세';
      var rev=af.revenue||af['수입']||af['수입금액'], dec=af.decisive_tax||af['결정세액'];
      var rate=(rev&&dec)?(' <span class="rate">· '+((Number(dec)/Number(rev))*100).toFixed(2)+'%</span>'):'';
      var st=f.review_status||'작성중';
      var bcls=st==='보관완료'?'green':(st==='결재대기'?'amber':'gray');
      pushAct((f.fiscal_year||'')+'귀속 '+(f.type||'')+' 검토표 생성', f.created_at, false);
      return '<div class="case-row">'
        +'<div class="case-left"><div class="case-icon">'+E(ty)+'</div>'
        +'<div class="case-info"><div class="case-title">'+E((f.fiscal_year||'')+'귀속 '+(f.type||''))
        +' <span class="badge '+bcls+'">'+E(st)+'</span></div>'
        +'<div class="case-meta"><span>신고 검토표</span><span class="sep">·</span><span>'+E(dstr(f.created_at))+' 생성</span></div></div></div>'
        +'<div class="case-right">'
        +'<div class="case-stat"><div class="case-stat-label">수입</div><div class="case-stat-value">'+(rev?fmt(rev):'—')+'</div></div>'
        +'<div class="case-stat"><div class="case-stat-label">결정세액</div><div class="case-stat-value">'+(dec?fmt(dec):'—')+rate+'</div></div>'
        +'<span class="chev">›</span></div></div>';
    }).join('');
    renderActivity();
  });

  /* 4) 메모 풀세트 — admin-memos.js _loadCdAllMemos (첨부·카테고리·기한·드래그 전부) */
  window.reloadMemos=function(){
    try{
      window._cdCurrentUserId=UID;
      if(typeof _loadCdAllMemos==='function') _loadCdAllMemos(UID);
      /* 메모 카운트 + 활동 합성 — _cdMemosCache 갱신 후 */
      setTimeout(function(){
        try{
          var c=(window._cdMemosCache||[]);
          $('memoCount').textContent=c.length;
          /* 최근 메모 활동 합성 (상위 5) */
          c.slice(0,5).forEach(function(m){
            pushAct('메모: '+String(m.content||'').slice(0,24), m.created_at, false);
          });
          renderActivity();
          /* 할 일 = 미완료 할 일 메모 */
          var todos=c.filter(function(m){ return (m.memo_type==='할 일'||m._t==='할 일'); });
          var tb=$('todoBox');
          if(!todos.length){ tb.innerHTML='미완료 할 일이 없습니다'; }
          else{ tb.style.padding='8px 18px 16px';tb.style.textAlign='left';
            tb.innerHTML=todos.slice(0,8).map(function(m){
              return '<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--navy)">•</span><span style="flex:1">'+E(String(m.content||'').slice(0,40))+'</span>'+(m.due_date?'<span style="color:var(--text-3);font-size:11px">'+E(m.due_date)+'</span>':'')+'</div>';
            }).join(''); }
        }catch(_){}
      }, 600);
    }catch(err){ var l=$('cdMemoList'); if(l) l.innerHTML='<div style="color:var(--red)">메모 로드 오류: '+E(err.message)+'</div>'; }
  };
  /* admin-memos.js 로드 후 부팅 */
  function bootMemo(){
    if(typeof _loadCdAllMemos==='function'){ window.reloadMemos(); }
    else setTimeout(bootMemo,150);
  }
  bootMemo();
})();
</script>
</body>
</html>
