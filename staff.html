<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직원 관리자 - 세무회계 이윤</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin.css?v=14">
</head>
<body class="staff-mode">

<!-- 메인 (세션 기반 자동 진입) -->
<div class="wrap" id="mainView" style="display:none">
<div class="hdr">
<h1>관리자<span class="staff-badge">직원</span></h1>
<div class="tabs">
<button class="on" id="tabRooms" onclick="tab('rooms')">💬 상담방</button>
<button id="tabLive" onclick="tab('live')" style="position:relative">📡 실시간<span id="liveBadge" style="display:none;background:#f04452;color:#fff;border-radius:10px;padding:1px 6px;font-size:.75em;margin-left:4px">0</span></button>
<button id="tabClients" onclick="tab('clients')">🏢 거래처</button>
</div>
<button class="logout" onclick="openSearch()" style="margin-left:auto" title="전역 검색">🔍 검색</button>
<a href="/" class="logout" style="text-decoration:none" title="일반 챗봇 페이지로">🏠 챗봇</a>
<button class="logout" onclick="staffLogout()">로그아웃</button>
</div>
<!-- 전역 검색 모달 -->
<div id="searchModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:flex-start;justify-content:center;padding:40px 20px">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:14px 16px;border-bottom:1px solid #e5e8eb;display:flex;gap:8px;align-items:center">
      <input id="searchInput" type="text" placeholder="사용자·대화·상담방 전체 검색 (2자 이상)..." oninput="onSearchInput()" style="flex:1;padding:10px 14px;border:1px solid #e5e8eb;border-radius:10px;font-size:.9em;font-family:inherit;outline:none">
      <button onclick="document.getElementById('searchModal').style.display='none'" style="background:#fff;border:1px solid #e5e8eb;padding:10px 14px;border-radius:10px;font-size:.85em;cursor:pointer;font-family:inherit">✕</button>
    </div>
    <div id="searchResults" style="flex:1;overflow-y:auto;padding:14px 16px;background:#f9fafb">
      <div style="text-align:center;color:#8b95a1;font-size:.85em;padding:40px 0">검색어를 입력하세요</div>
    </div>
  </div>
</div>

<!-- 상담방 (단톡방) -->
<div id="roomsView" style="display:none">
<div id="roomsLayout" style="display:flex;gap:14px;height:calc(100vh - 180px);min-height:500px">
  <!-- 좌: 방 목록 + 생성 버튼 -->
  <div class="room-list-panel" style="width:300px;background:#fff;border-radius:12px;padding:10px;overflow-y:auto;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.03);display:flex;flex-direction:column">
    <button onclick="openCreateRoom()" class="room-create-btn">＋ 상담방 개설</button>
    <div id="roomList" style="flex:1;overflow-y:auto"></div>
  </div>
  <!-- 우: 방 대화창 -->
  <div class="room-chat-panel" style="flex:1;background:#fff;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03);min-width:0">
    <div id="roomChatHeader" style="padding:12px 16px;border-bottom:1px solid #e5e8eb;display:flex;align-items:center;justify-content:space-between;gap:6px">
      <button id="roomsBackBtn" onclick="closeRoomOnMobile()">← 목록</button>
      <div id="roomChatTitle" style="font-size:.9em;color:#8b95a1;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">좌측 상담방을 선택하세요</div>
      <div id="roomActions" style="display:none;gap:6px">
        <button onclick="openRoomInfo()" style="background:#e5e8eb;border:none;padding:5px 10px;border-radius:6px;font-size:.75em;cursor:pointer;font-family:inherit" title="미디어·링크·검색">📂 정보</button>
        <button onclick="renameRoom()" style="background:#e5e8eb;border:none;padding:5px 10px;border-radius:6px;font-size:.75em;cursor:pointer;font-family:inherit" title="이름 변경">✏️ 이름</button>
        <button onclick="addMemberPrompt()" style="background:#e5e8eb;border:none;padding:5px 10px;border-radius:6px;font-size:.75em;cursor:pointer;font-family:inherit">＋ 멤버</button>
        <button onclick="toggleRoomStatus()" style="background:#e5e8eb;border:none;padding:5px 10px;border-radius:6px;font-size:.75em;cursor:pointer;font-family:inherit" id="roomStatusBtn">종료</button>
        <button onclick="deleteCurrentRoom()" style="background:#fee2e2;color:#f04452;border:none;padding:5px 10px;border-radius:6px;font-size:.75em;cursor:pointer;font-family:inherit">🗑️ 삭제</button>
      </div>
    </div>
    <div id="roomMembers" style="display:none;padding:8px 16px;border-bottom:1px solid #e5e8eb;background:#f9fafb;font-size:.75em;color:#555"></div>
    <div id="roomMessages" style="flex:1;overflow-y:auto;padding:14px 16px;background:#f9fafb"></div>
    <!-- 답장 프리뷰 바 -->
    <div id="roomReplyBar">
      <div class="rc-reply-body">
        <div class="rc-reply-to">↩︎ <span id="roomReplyToName"></span>에게 답장</div>
        <div class="rc-reply-txt" id="roomReplyPreview"></div>
      </div>
      <button class="rc-reply-close" onclick="cancelRoomReply()" aria-label="답장 취소">✕</button>
    </div>
    <!-- 첨부 시트 (+ 누르면 펼침, 카톡 스타일) -->
    <div id="roomAttachSheet" style="display:none;padding:14px 18px;border-top:1px solid #e5e8eb;background:#f9fafb;gap:24px;justify-content:flex-start;flex-wrap:wrap">
      <label for="roomFileInput" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:.78em;color:#555;font-family:inherit">
        <div style="width:52px;height:52px;background:#fef3c7;color:#b45309;border-radius:50%;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <span>사진첩</span>
      </label>
      <input id="roomFileInput" type="file" accept="image/*" onchange="sendRoomImage(this);closeRoomAttachSheet()" style="display:none">
      <label for="roomCamInput" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:.78em;color:#555;font-family:inherit">
        <div style="width:52px;height:52px;background:#e0f5ec;color:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <span>카메라</span>
      </label>
      <input id="roomCamInput" type="file" accept="image/*" capture="environment" onchange="sendRoomImage(this);closeRoomAttachSheet()" style="display:none">
      <label for="roomDocInput" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:.78em;color:#555;font-family:inherit">
        <div style="width:52px;height:52px;background:#dbeafe;color:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </div>
        <span>파일</span>
      </label>
      <input id="roomDocInput" type="file" accept=".pdf,.xls,.xlsx,.doc,.docx,.ppt,.pptx,.hwp,.hwpx,.txt,.csv,.zip" onchange="sendRoomFile(this);closeRoomAttachSheet()" style="display:none">
    </div>
    <div id="roomInputArea" style="display:none;padding:10px 12px;border-top:1px solid #e5e8eb;display:flex;gap:8px;align-items:center">
      <button onclick="toggleRoomAttachSheet()" id="roomAttachBtn" title="첨부" style="display:inline-flex;align-items:center;justify-content:center;background:#f2f4f6;border:1px solid #e5e8eb;color:#555;width:38px;height:38px;border-radius:50%;cursor:pointer;flex-shrink:0;line-height:0;padding:0;transition:transform .15s;font-family:inherit">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <input id="roomInput" type="text" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendRoomMessage()" onfocus="closeRoomAttachSheet()" style="flex:1;min-width:0;padding:10px 14px;border:1px solid #e5e8eb;border-radius:10px;font-size:.88em;outline:none;font-family:inherit">
      <button onclick="sendRoomMessage()" style="background:#3182f6;color:#fff;border:none;padding:10px 16px;border-radius:10px;font-size:.88em;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap">전송</button>
    </div>
    <script>
      function toggleRoomAttachSheet(){
        var s=document.getElementById('roomAttachSheet');
        var b=document.getElementById('roomAttachBtn');
        var open=s.style.display==='flex';
        s.style.display=open?'none':'flex';
        if(b)b.style.transform=open?'rotate(0deg)':'rotate(45deg)';
      }
      function closeRoomAttachSheet(){
        var s=document.getElementById('roomAttachSheet');
        var b=document.getElementById('roomAttachBtn');
        s.style.display='none';
        if(b)b.style.transform='rotate(0deg)';
      }
    </script>
  </div>
</div>
</div>

<!-- 실시간 대화 개입 -->
<div id="liveView" style="display:none">
<div style="display:flex;gap:14px;height:calc(100vh - 180px);min-height:500px">
  <!-- 좌: 세션 목록 -->
  <div style="width:280px;background:#fff;border-radius:12px;padding:10px;overflow-y:auto;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.03)">
    <div style="padding:6px 10px;font-size:.78em;color:#8b95a1;font-weight:600;display:flex;justify-content:space-between;align-items:center">
      <span>최근 30분 활성 세션</span>
      <span id="liveTotalUnread" style="display:none;background:#f04452;color:#fff;border-radius:8px;padding:1px 8px;font-size:.9em"></span>
    </div>
    <div id="liveSessionList" style="margin-top:6px"></div>
  </div>
  <!-- 우: 대화창 -->
  <div style="flex:1;background:#fff;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.03)">
    <div id="liveChatHeader" style="padding:12px 16px;border-bottom:1px solid #e5e8eb;display:flex;align-items:center;justify-content:space-between">
      <div id="liveChatTitle" style="font-size:.9em;color:#8b95a1">좌측 세션을 선택하세요</div>
      <div id="liveAiToggle" style="display:none">
        <label style="display:flex;align-items:center;gap:6px;font-size:.78em;cursor:pointer">
          <input type="checkbox" id="liveAiOn" onchange="toggleAiMode(this.checked)" checked>
          <span>🤖 AI 자동답변</span>
        </label>
      </div>
    </div>
    <div id="liveMessages" style="flex:1;overflow-y:auto;padding:14px 16px;background:#f9fafb"></div>
    <div id="liveInputArea" style="display:none;padding:10px 12px;border-top:1px solid #e5e8eb;display:flex;gap:8px">
      <input id="liveInput" type="text" placeholder="거래처에게 직접 답변..." onkeydown="if(event.key==='Enter')sendLiveMessage()" style="flex:1;padding:10px 14px;border:1px solid #e5e8eb;border-radius:10px;font-size:.88em;outline:none;font-family:inherit">
      <button onclick="sendLiveMessage()" style="background:#3182f6;color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:.88em;font-weight:600;cursor:pointer;font-family:inherit">전송</button>
    </div>
  </div>
</div>
</div>


<!-- 거래처 사업장 관리 (직원용 간소화) -->
<div id="clientsView" style="display:none">
<div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
<input id="clientsSearchInput" type="text" placeholder="이름·전화·사업자명으로 검색..." oninput="onClientsSearchInput()" style="flex:1;min-width:200px;padding:9px 12px;border:1px solid #e5e8eb;border-radius:8px;font-size:.85em;font-family:inherit;outline:none">
<span style="font-size:.75em;color:#8b95a1">기장거래처만 표시</span>
</div>
<div id="clientsList"><div class="empty">불러오는 중...</div></div>
</div>

<!-- 거래처 사업장 관리 모달 (복수 지원) -->
<div id="profileModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:20px">
<div style="background:#fff;border-radius:16px;padding:22px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
<h3 style="font-size:1.1em;margin:0" id="pmTitle">거래처 사업장 관리</h3>
<button onclick="closeProfileModal()" style="background:none;border:none;font-size:1.3em;cursor:pointer;color:#8b95a1">✕</button>
</div>
<p id="pmUserInfo" style="font-size:.8em;color:#8b95a1;margin:0 0 14px"></p>

<!-- 목록 화면 -->
<div id="pmListView">
  <button onclick="pmNewBusiness()" style="width:100%;background:#3182f6;color:#fff;border:none;padding:10px;border-radius:8px;font-size:.85em;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px">＋ 사업장 추가</button>
  <div id="pmBizList"></div>
</div>

<!-- 편집 화면 (숨김) -->
<div id="pmEditView" style="display:none">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
<div><label style="font-size:.75em;font-weight:600;color:#555">상호</label><input id="pmCompany" type="text" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">사업자번호</label><input id="pmBizNo" type="text" placeholder="1234567890" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">대표자</label><input id="pmCEO" type="text" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">연락처</label><input id="pmPhone" type="text" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">업종</label><input id="pmIndustry" type="text" placeholder="음식점/도소매/서비스 등" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">사업형태</label><select id="pmBizType" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"><option value="">선택</option><option value="개인">개인사업자</option><option value="법인">법인사업자</option></select></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">과세유형</label><select id="pmTaxType" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"><option value="">선택</option><option value="일반과세">일반과세</option><option value="간이과세">간이과세</option><option value="면세">면세</option><option value="법인">법인세</option></select></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">부가세 주기</label><select id="pmVatPeriod" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"><option value="">선택</option><option value="연 2회 (1/7월)">연 2회 (1/7월)</option><option value="연 4회 (예정+확정)">연 4회</option><option value="면세(신고 없음)">면세(없음)</option></select></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">개업일</label><input id="pmEstDate" type="date" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div><label style="font-size:.75em;font-weight:600;color:#555">직원수</label><input id="pmEmp" type="number" min="0" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div style="grid-column:span 2"><label style="font-size:.75em;font-weight:600;color:#555">주소</label><input id="pmAddr" type="text" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div style="grid-column:span 2"><label style="font-size:.75em;font-weight:600;color:#555">최근 매출 (원)</label><input id="pmRevenue" type="number" min="0" style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit"></div>
<div style="grid-column:span 2"><label style="font-size:.75em;font-weight:600;color:#555">세무사 메모 (AI가 참조)</label><textarea id="pmNotes" rows="3" placeholder="예: 배달 비중 큼. 올해 시설투자 예정. 가지급금 이슈 있음." style="width:100%;padding:9px;border:1px solid #e5e8eb;border-radius:8px;font-size:.88em;font-family:inherit;resize:vertical"></textarea></div>
<div style="grid-column:span 2"><label style="display:flex;align-items:center;gap:8px;font-size:.8em;font-weight:600;color:#555"><input type="checkbox" id="pmIsPrimary"><span>⭐ 주 사업장으로 설정 (대표 사업장)</span></label></div>
</div>
<div style="display:flex;gap:8px;margin-top:14px">
<button onclick="saveBusiness()" style="flex:1;background:#3182f6;color:#fff;border:none;padding:11px;border-radius:8px;font-size:.9em;font-weight:600;cursor:pointer;font-family:inherit">저장</button>
<button onclick="pmBackToList()" style="background:#e5e8eb;color:#555;border:none;padding:11px 20px;border-radius:8px;font-size:.9em;cursor:pointer;font-family:inherit">← 목록</button>
<button id="pmDeleteBtn" onclick="deleteBusiness()" style="display:none;background:#fee2e2;color:#f04452;border:none;padding:11px 16px;border-radius:8px;font-size:.9em;cursor:pointer;font-family:inherit">🗑️ 삭제</button>
</div>
</div>
</div>
</div>

<!-- 멤버 추가 모달 -->
<div id="addMemberModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:20px">
<div style="background:#fff;border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
<h3 style="font-size:1.05em;margin:0">＋ 멤버 추가</h3>
<button onclick="document.getElementById('addMemberModal').style.display='none'" style="background:none;border:none;font-size:1.3em;cursor:pointer;color:#8b95a1">✕</button>
</div>
<input id="amSearch" type="text" placeholder="이름/전화 검색..." oninput="filterAddMember()" style="width:100%;padding:9px 12px;border:1px solid #e5e8eb;border-radius:8px;font-size:.85em;font-family:inherit;margin-bottom:10px">
<div id="amList" style="max-height:420px;overflow-y:auto;border:1px solid #e5e8eb;border-radius:8px">로딩...</div>
<p style="font-size:.72em;color:#8b95a1;margin:10px 0 0;text-align:center">선택하면 바로 방에 추가됩니다</p>
</div>
</div>

<!-- 상담방 정보(검색·사진·링크) 모달 -->

<script>
/* staff.html 진입 로직 + 거래처 탭 + tab 래핑 (admin.js의 IS_OWNER 플래그를 false로 오버라이드) */
IS_OWNER=false;

async function staffBoot(){
  try{
    const r=await fetch('/api/auth/me');
    const d=await r.json();
    if(!d.logged_in||!d.user||!d.user.is_admin){
      document.getElementById('notAuthView').style.display='flex';
      return;
    }
    KEY='';
    document.getElementById('mainView').style.display='block';
    if(typeof loadRoomList==='function'){try{loadRoomList()}catch(e){}}
    if(typeof refreshLiveBadge==='function'){try{refreshLiveBadge();setInterval(refreshLiveBadge,10000)}catch(e){}}
    /* 이전 탭 복원 (유효한 staff 탭만) */
    var savedTab=null;
    try{savedTab=localStorage.getItem('admin_last_tab')}catch(e){}
    if(savedTab&&['rooms','live','clients'].indexOf(savedTab)>=0)tab(savedTab);
    else tab('rooms');
  }catch(e){
    document.getElementById('notAuthView').style.display='flex';
  }
}

/* admin.js의 tab()에 거래처 탭 추가 처리 */
(function(){
  const _origTab=tab;
  tab=function(t){
    try{_origTab(t)}catch(e){}
    const cv=document.getElementById('clientsView');
    if(cv)cv.style.display=t==='clients'?'block':'none';
    const tc=document.getElementById('tabClients');
    if(tc)tc.className=t==='clients'?'on':'';
    /* staff 탭 활성 표시 */
    const tr=document.getElementById('tabRooms');if(tr)tr.className=t==='rooms'?'on':'';
    const tl=document.getElementById('tabLive');if(tl)tl.className=t==='live'?'on':'';
    if(t==='clients')loadClients();
  };
})();

/* 거래처 목록 (approved_client만) */
let clientsTimer=null;
function onClientsSearchInput(){
  if(clientsTimer)clearTimeout(clientsTimer);
  clientsTimer=setTimeout(loadClients,250);
}
async function loadClients(){
  const el=document.getElementById('clientsList');
  el.innerHTML='<div class="empty">불러오는 중...</div>';
  try{
    const q=document.getElementById('clientsSearchInput').value.trim();
    const r=await fetch('/api/admin-approve?status=approved_client');
    const d=await r.json();
    if(d.error){el.innerHTML='<div class="empty">'+e(d.error)+'</div>';return}
    let users=d.users||[];
    if(q){
      const qL=q.toLowerCase();
      users=users.filter(u=>{
        return (u.real_name||'').toLowerCase().includes(qL)
          ||(u.name||'').toLowerCase().includes(qL)
          ||(u.phone||'').includes(q)
          ||(u.email||'').toLowerCase().includes(qL);
      });
    }
    if(users.length===0){el.innerHTML='<div class="empty">'+(q?'검색 결과 없음':'등록된 기장거래처 없음')+'</div>';return}
    el.innerHTML=users.map(u=>{
      const nm=u.real_name||u.name||'이름없음';
      const av=u.profile_image?'<img src="'+e(u.profile_image)+'" alt="">':nm[0];
      const phone=u.phone?' · '+e(u.phone):'';
      return '<div class="item" onclick="openProfile('+u.id+',\''+e(nm).replace(/\'/g,"")+'\')">'
        +'<div class="avatar">'+av+'</div>'
        +'<div class="info"><div class="name">'+e(nm)+'</div>'
        +'<div class="meta">'+e(u.email||'')+phone+'</div></div>'
        +'<div class="right"><div class="cnt">📋 거래처정보</div></div>'
        +'</div>';
    }).join('');
  }catch(err){el.innerHTML='<div class="empty">오류: '+e(err.message)+'</div>'}
}

/* 로그아웃: 카톡/네이버 세션 종료 후 홈으로 */
async function staffLogout(){
  try{await fetch('/api/auth/logout',{method:'POST'})}catch(e){}
  location.replace('/');
}

staffBoot();

/* ===== 풀스크린 이미지 뷰어 (카톡 스타일) ===== */
var ivState={srcs:[],idx:0,startX:0,startY:0,dx:0,dy:0,touching:false,swiped:false,axis:null};
function collectImagesNear(el){
  var c=el.closest('#roomMessages')||el.closest('#riPhotoGrid')||document.body;
  var nodes=c.querySelectorAll('img.rc-img-msg, img.ri-photo, .ri-photo img');
  var arr=[];nodes.forEach(function(n){if(n.src)arr.push(n.src)});
  return arr.length?arr:[el.src];
}
function openImgViewer(src,srcs){
  if(!Array.isArray(srcs)||srcs.length===0)srcs=[src];
  var i=srcs.indexOf(src);if(i<0)i=0;
  ivState.srcs=srcs;ivState.idx=i;
  var v=document.getElementById('imgViewer');
  v.classList.add('open');v.classList.toggle('has-multiple',srcs.length>1);
  document.body.style.overflow='hidden';
  renderIvImg();
  try{history.pushState({iv:1},'',location.href)}catch{}
}
function closeImgViewer(){
  var v=document.getElementById('imgViewer');
  if(!v||!v.classList.contains('open'))return;
  v.classList.remove('open');document.body.style.overflow='';
  try{if(history.state&&history.state.iv)history.back()}catch{}
}
function renderIvImg(){
  var img=document.getElementById('ivImg');if(!img)return;
  img.src=ivState.srcs[ivState.idx]||'';
  var c=document.getElementById('ivCounter');
  if(c)c.textContent=(ivState.idx+1)+' / '+ivState.srcs.length;
}
function imgViewerNav(d){
  if(ivState.srcs.length<2)return;
  var next=ivState.idx+d;
  if(next<0||next>=ivState.srcs.length)return;
  ivState.idx=next;
  renderIvImg();
}
async function saveImgViewer(){
  var src=ivState.srcs[ivState.idx];if(!src)return;
  try{
    var r=await fetch(src);if(!r.ok)throw new Error();
    var b=await r.blob();
    var nm=(src.split('/').pop()||'image').split('?')[0]||'image';
    var mime=b.type;
    if(!mime||mime==='application/octet-stream'){
      var urlExt=((nm.match(/\.(\w+)$/)||[,''])[1]||'').toLowerCase();
      mime=urlExt==='png'?'image/png':urlExt==='webp'?'image/webp':urlExt==='gif'?'image/gif':urlExt==='heic'?'image/heic':'image/jpeg';
      b=b.slice(0,b.size,mime);
    }
    var ext=(mime.split('/')[1]||'jpg').replace('jpeg','jpg');
    if(!/\.\w+$/.test(nm))nm+='.'+ext;
    /* Web Share API: iOS 사진 / Android 갤러리 */
    try{
      if(typeof File==='function'&&navigator.canShare){
        var file=new File([b],nm,{type:mime});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file]});
          return;
        }
      }
    }catch(se){
      if(se&&se.name==='AbortError')return;
    }
    /* 폴백: 다운로드 링크 */
    var url=URL.createObjectURL(b);
    var a=document.createElement('a');
    a.href=url;a.download=nm;document.body.appendChild(a);a.click();
    setTimeout(function(){URL.revokeObjectURL(url);a.remove()},150);
  }catch{window.open(src,'_blank')}
}
(function(){
  var v=document.getElementById('imgViewer');if(!v)return;
  function img(){return document.getElementById('ivImg')}
  function resetTransform(animate){
    var i=img();if(!i)return;
    i.style.transition=animate?'transform .2s ease-out':'none';
    i.style.transform='';
  }
  v.addEventListener('click',function(e){
    if(ivState.swiped){ivState.swiped=false;return}
    if(e.target===v)closeImgViewer();
  });
  v.addEventListener('touchstart',function(e){
    if(e.touches.length!==1)return;
    ivState.startX=e.touches[0].clientX;ivState.startY=e.touches[0].clientY;
    ivState.dx=0;ivState.dy=0;ivState.touching=true;ivState.axis=null;
    var i=img();if(i)i.style.transition='none';
  },{passive:true});
  v.addEventListener('touchmove',function(e){
    if(!ivState.touching||e.touches.length!==1)return;
    var dx=e.touches[0].clientX-ivState.startX;
    var dy=e.touches[0].clientY-ivState.startY;
    if(!ivState.axis){
      if(Math.abs(dx)<8&&Math.abs(dy)<8)return;
      ivState.axis=Math.abs(dx)>=Math.abs(dy)?'x':'y';
    }
    ivState.dx=dx;ivState.dy=dy;
    if(e.cancelable)e.preventDefault();
    var i=img();if(!i)return;
    if(ivState.axis==='x'){
      var edge=(ivState.idx===0&&dx>0)||(ivState.idx===ivState.srcs.length-1&&dx<0);
      var d=edge?dx*0.35:dx;
      i.style.transform='translateX('+d+'px)';
    } else if(dy>0){
      i.style.transform='translateY('+dy+'px)';
    }
  },{passive:false});
  v.addEventListener('touchend',function(){
    if(!ivState.touching)return;ivState.touching=false;
    var dx=ivState.dx,dy=ivState.dy,axis=ivState.axis;
    ivState.dx=0;ivState.dy=0;ivState.axis=null;
    if(axis==='x'&&Math.abs(dx)>50){
      imgViewerNav(dx>0?-1:1);
      ivState.swiped=true;
      setTimeout(function(){ivState.swiped=false},400);
      resetTransform(false);
    } else if(axis==='y'&&dy>120){
      closeImgViewer();
      resetTransform(false);
    } else {
      resetTransform(true);
    }
  },{passive:true});
  v.addEventListener('touchcancel',function(){
    if(!ivState.touching)return;
    ivState.touching=false;ivState.dx=0;ivState.dy=0;ivState.axis=null;
    resetTransform(true);
  });
  document.addEventListener('keydown',function(e){
    if(!v.classList.contains('open'))return;
    if(e.key==='Escape')closeImgViewer();
    else if(e.key==='ArrowLeft')imgViewerNav(-1);
    else if(e.key==='ArrowRight')imgViewerNav(1);
  });
  window.addEventListener('popstate',function(){
    if(v.classList.contains('open')){v.classList.remove('open');document.body.style.overflow=''}
  });
})();
</script>
