<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자로 이동 - 세무회계 이윤</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<!--
  Phase M5 (2026-05-05 사장님 명령: "스태프 html지우기로 한거 아님?"): staff.html 폐기 → admin.html redirect
  사장님 결정 (2026-05-04 CLAUDE.md): "어차피 스태프는 지울거잖아" — admin 단일화 (S3c) 후
  staff mirror 의미 없음. 매 commit 양쪽 동기화 부담 해제.

  redirect 흐름 (office.html S3c-3 패턴 — 3중 안전망):
  1) JS location.replace — 가장 빠름 (history 안 쌓임)
  2) <meta http-equiv="refresh"> — JS 막힌 경우 fallback
  3) 본문 link — meta 막힌 경우 사용자 직접 클릭

  query string + hash 보존 — /staff?key=X#tab=Y → /admin?key=X#tab=Y
-->
<meta http-equiv="refresh" content="0;url=/admin.html">
<script>
try {
  var q = location.search || '';
  var h = location.hash || '';
  location.replace('/admin.html' + q + h);
} catch(_) {}
</script>
<style>body{font-family:'Noto Sans KR',sans-serif;text-align:center;padding:60px 20px;color:#666;background:#f3f4f6}a{color:#3182f6;text-decoration:none;font-weight:600}</style>
</head>
<body>
<p>관리자 페이지로 이동합니다... <a href="/admin.html">바로가기</a></p>
</body>
</html>
