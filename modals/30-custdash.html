                <option value="일반">📝 일반</option>
              </select>
              <input id="cdMemoNewDue" type="date" style="background:#fff;border:1px solid var(--neutral-border);border-radius:6px;padding:6px 8px;font-size:.8em;font-family:inherit" title="기한 (선택)">
              <button type="button" onclick="document.getElementById('cdMemoNewFile').click()" style="background:#fff;color:var(--of-primary);border:1px dashed var(--of-primary);padding:6px 10px;border-radius:6px;font-size:.78em;font-weight:600;cursor:pointer;font-family:inherit">📎 첨부</button>
              <input id="cdMemoNewFile" type="file" multiple accept="image/*,.pdf,.hwp,.hwpx" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none" onchange="onCdMemoFileSelect(event)">
              <span id="cdMemoNewFileLabel" style="font-size:.74em;color:var(--text-mute)"></span>
            </div>
            <textarea id="cdMemoNewContent" rows="2" placeholder="예) 음식점 / 현금 매출 많음 #일반&#10;예) 5/15 부가세 매입 영수증 12장 수령 #부가세 #영수증" style="width:100%;padding:7px 10px;border:1px solid var(--neutral-border);border-radius:6px;font-size:.85em;font-family:inherit;outline:none;resize:vertical;min-height:48px"></textarea>
            <div style="display:flex;gap:6px;align-items:center;justify-content:flex-end">
              <span style="font-size:.7em;color:var(--text-mute);margin-right:auto">💡 #키워드 자동 태그</span>
              <button onclick="addCdMemo()" style="background:var(--of-primary);color:#fff;border:none;padding:7px 18px;border-radius:7px;font-size:.82em;font-weight:700;cursor:pointer;font-family:inherit">＋ 추가</button>
            </div>
          </div>
          <!-- 호환: 기존 cdCustomerInfo / cdInfoNew 가드 (혹시 다른 코드가 참조해도 안 깨지도록) -->
          <div id="cdCustomerInfo" class="hidden"></div>
          <input id="cdInfoNew" type="hidden">
        </div>
        <!-- 📋 이 거래처 관련 할 일 -->
        <div style="background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.03)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="font-weight:700;font-size:.92em"><span style="color:var(--of-primary);display:inline-flex;vertical-align:-2px;margin-right:3px"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5h9M7 10h9M7 15h9"/><path d="M2.5 5l1 1 1.5-1.8M2.5 10l1 1 1.5-1.8M2.5 15l1 1 1.5-1.8"/></svg></span> 할 일 <span id="cdTodoCount" style="font-size:.72em;color:var(--text-mute);font-weight:500;margin-left:4px"></span></div>
            <button onclick="openMyTodos()" style="background:none;border:none;color:var(--of-primary);font-size:.72em;cursor:pointer;font-family:inherit">전체 대시보드 →</button>
          </div>
          <div id="cdTodos" style="font-size:.85em;max-height:180px;overflow-y:auto"></div>
        </div>
        <!-- <span style="color:var(--of-primary);display:inline-flex;vertical-align:-2px;margin-right:3px"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2l1.6 4.4L16 8l-4.4 1.6L10 14l-1.6-4.4L4 8l4.4-1.6L10 2z"/><path d="M16 13l.7 2 .3.7-2-.7-.7-.3z"/></svg></span> 최근 AI 요약 이력 -->
        <div style="background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.03)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="font-weight:700;font-size:.92em"><span style="color:var(--of-primary);display:inline-flex;vertical-align:-2px;margin-right:3px"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2l1.6 4.4L16 8l-4.4 1.6L10 14l-1.6-4.4L4 8l4.4-1.6L10 2z"/><path d="M16 13l.7 2 .3.7-2-.7-.7-.3z"/></svg></span> 최근 AI 요약 <span id="cdSummaryCount" style="font-size:.72em;color:var(--text-mute);font-weight:500;margin-left:4px"></span></div>
          </div>
          <div id="cdSummaries" style="font-size:.85em;max-height:180px;overflow-y:auto"></div>
        </div>
        <!-- 최근 대화 -->
        <div style="background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.03);grid-column:1/-1">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-weight:700;font-size:.92em"><span style="color:var(--of-primary);display:inline-flex;vertical-align:-2px;margin-right:3px"><svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h14v10H8l-4 3.5V4z"/><path d="M7 8h6M7 11h4"/></svg></span> 최근 상담</div>
            <button onclick="cdGotoRoom()" style="background:none;border:none;color:var(--of-primary);font-size:.75em;cursor:pointer;font-family:inherit">상담방 열기 →</button>
          </div>
          <div id="cdRecentChat" style="font-size:.85em;max-height:240px;overflow-y:auto"></div>
        </div>
      </div>
    </div>
  </div>
</div>
