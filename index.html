<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>세무회계 이윤 - AI 세무 상담</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#191f28">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="세무회계 이윤">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2f4f6;--card:#fff;--navy:#191f28;--blue:#3182f6;--blue-light:#e8f3ff;--text:#191f28;--text2:#8b95a1;--text3:#b0b8c1;--border:#e5e8eb;--success:#00c471;--shadow:0 2px 8px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);height:100vh;height:100dvh;display:flex;flex-direction:column;color:var(--text);-webkit-font-smoothing:antialiased}

/* ── 헤더 ── */
.header{background:var(--card);padding:0 20px;height:56px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header-logo{height:32px}
.header-right{display:flex;align-items:center;gap:4px;margin-left:auto}
.hdr-btn{font-size:.78em;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:8px;transition:.15s;font-weight:500}
.hdr-btn:hover{background:var(--bg)}

/* ── 사용자 정보 ── */
.user-info{display:flex;align-items:center;flex-shrink:0}
.user-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65em;font-weight:600;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover}

/* ── 세금 기한 알림 ── */
.tax-alert{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#fff8e1,#fff3cd);border:1px solid #ffe082;border-radius:10px;padding:10px 14px;margin:0 20px;animation:msgIn .3s ease}
.tax-alert-icon{font-size:1.1em;flex-shrink:0}
.tax-alert-text{flex:1;font-size:.78em;font-weight:600;color:#6d4c00;line-height:1.4}
.tax-alert-close{background:none;border:none;color:#b0960a;font-size:1em;cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0}
.tax-alert-close:hover{background:rgba(0,0,0,.06)}
.tax-alert-setting{background:none;border:none;color:#b0960a;font-size:.85em;cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0}

/* ── 채팅 ── */
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.chat-area::-webkit-scrollbar{display:none}

.msg{display:flex;gap:10px;max-width:80%;animation:msgIn .3s ease}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:12px;flex-shrink:0;overflow:hidden;margin-top:2px;background:var(--navy);display:flex;align-items:center;justify-content:center}
.msg-avatar img{width:100%;height:100%;object-fit:cover;padding:4px}
.msg-user .msg-avatar{display:none}
.msg-wrap{display:flex;flex-direction:column;gap:2px}
.msg-name{font-size:.68em;color:var(--text2);margin-left:4px;margin-bottom:2px;font-weight:500}
.msg-bubble{padding:12px 16px;font-size:.9em;line-height:1.65;word-break:break-word;white-space:pre-wrap;letter-spacing:-.2px}
.msg-ai .msg-bubble{background:var(--card);color:var(--text);border-radius:4px 16px 16px 16px;box-shadow:var(--shadow)}
.msg-user .msg-bubble{background:var(--blue);color:#fff;border-radius:16px 4px 16px 16px}

/* ── 로딩 ── */
.dots{display:flex;gap:5px;padding:4px 0}
.dots span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:pulse 1.2s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── 빠른질문 ── */
.quick{padding:8px 20px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick::-webkit-scrollbar{display:none}
.quick button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:20px;font-size:.82em;cursor:pointer;white-space:nowrap;font-weight:500;transition:.15s;flex-shrink:0;font-family:inherit;box-shadow:var(--shadow)}
.quick button:hover{border-color:var(--blue);color:var(--blue)}
.quick button:active{transform:scale(.96)}

/* ── 환급 조회 ── */
.refund-bar{padding:2px 20px;background:var(--bg)}
.refund-btn{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#e8f3ff,#f0f7ff);border:1px solid #d0e4f7;border-radius:10px;padding:10px 14px;text-decoration:none;transition:.15s;box-shadow:var(--shadow)}
.refund-btn:active{transform:scale(.99)}
.refund-icon{font-size:1.1em}
.refund-text{flex:1;display:flex;flex-direction:column;gap:1px}
.refund-title{font-size:.78em;font-weight:700;color:var(--blue)}
.refund-desc{font-size:.65em;color:var(--text2)}

/* ── AI 고지 ── */
.ai-notice{font-size:.72em;color:var(--blue);margin-top:14px;font-weight:500}
.disclaimer{padding:4px 20px;background:var(--bg)}
.disclaimer p{font-size:.68em;color:var(--text3);text-align:center;line-height:1.4}

/* ── 전화바 ── */
.cta-bar{padding:2px 20px;background:var(--bg)}
.cta-bar a{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 14px;text-decoration:none;transition:.15s;box-shadow:var(--shadow)}
.cta-bar a:active{transform:scale(.99)}
.cta-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--blue-light);border-radius:8px}
.cta-icon svg{width:14px;height:14px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cta-text{flex:1;font-size:.7em;color:var(--text2);line-height:1.3}
.cta-phone{font-size:.82em;font-weight:700;color:var(--blue)}

/* ── 입력 ── */
.input-bar{padding:10px 20px 16px;background:var(--card);display:flex;gap:8px;align-items:flex-end;border-top:1px solid var(--border)}
.input-bar input{flex:1;padding:12px 18px;background:var(--bg);border:1px solid var(--border);border-radius:12px;font-size:.9em;outline:none;color:var(--text);font-family:inherit;transition:.2s}
.input-bar input::placeholder{color:var(--text3)}
.input-bar input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.12)}
.send{width:40px;height:40px;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;background:var(--blue)}
.send:active{transform:scale(.9)}
.send:disabled{background:var(--text3);cursor:default;transform:none}
.send svg{width:18px;height:18px;fill:#fff}

/* ── 웰컴 ── */
.welcome{text-align:center;padding:72px 32px 32px;display:flex;flex-direction:column;align-items:center}
.welcome-logo{width:72px;height:72px;background:var(--navy);border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 4px 16px rgba(25,31,40,.12)}
.welcome-logo img{width:48px;height:48px;object-fit:contain}
.welcome h2{font-size:1.4em;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:8px}
.welcome p{font-size:.9em;color:var(--text2);line-height:1.55;font-weight:400}

/* ── 로그인 화면 ── */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;text-align:center;background:var(--bg)}
.login-screen .welcome-logo{width:80px;height:80px;background:var(--navy);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;box-shadow:0 4px 16px rgba(25,31,40,.12)}
.login-screen .welcome-logo img{width:52px;height:52px;object-fit:contain}
.login-screen h2{font-size:1.4em;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:8px}
.login-screen p{font-size:.9em;color:var(--text2);line-height:1.55;margin-bottom:36px}
.login-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px 20px;border:none;border-radius:12px;font-size:.92em;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;color:#fff;box-shadow:var(--shadow)}
.login-btn:active{transform:scale(.97)}
.login-btn.kakao{background:#FEE500;color:#191f28}
.login-btn.naver{background:#03C75A;color:#fff}
.login-btn svg{width:20px;height:20px;flex-shrink:0}

/* ── 모바일 ── */
@media(max-width:480px){
    .msg{max-width:88%}
    .header{padding:0 14px;height:52px;gap:6px}
    .header-logo{height:28px}
    .hdr-btn{font-size:.72em;padding:4px 8px}
    .welcome{padding:48px 24px 24px}
    .welcome-logo{width:60px;height:60px;border-radius:14px}
    .welcome-logo img{width:40px;height:40px}
    .welcome h2{font-size:1.2em}
    .login-screen h2{font-size:1.2em}
    .login-screen .welcome-logo{width:64px;height:64px;border-radius:16px}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo-icon.png" alt="세무회계 이윤" class="header-logo">
    <div class="header-right">
        <a href="/articles.html" class="hdr-btn">칼럼</a>
        <a href="javascript:void(0)" onclick="resetChat()" class="hdr-btn" id="resetBtn" style="display:none">초기화</a>
        <a href="/api/auth/logout" class="hdr-btn" id="logoutBtn" style="display:none">로그아웃</a>
    </div>
    <div class="user-info" id="userInfo" style="display:none">
        <div class="user-avatar" id="userAvatar"></div>
    </div>
</div>

<!-- 세금 기한 알림 -->
<div id="taxAlertArea" style="display:none;padding-top:8px"></div>

<!-- 로그인 화면 -->
<div class="login-screen" id="loginScreen" style="display:none">
    <div class="welcome-logo"><img src="logo-icon.png" alt="세무회계 이윤"></div>
    <h2>AI 세무 상담</h2>
    <p>로그인 후 세무 상담을 이용하실 수 있습니다</p>
    <div class="login-buttons">
        <a class="login-btn kakao" id="kakaoLoginBtn">
            <svg viewBox="0 0 24 24"><path fill="#191f28" d="M12 3C6.48 3 2 6.36 2 10.44c0 2.62 1.75 4.93 4.38 6.24l-1.12 4.16c-.1.36.32.65.64.44l4.94-3.26c.38.04.76.06 1.16.06 5.52 0 10-3.36 10-7.64C22 6.36 17.52 3 12 3z"/></svg>
            카카오 로그인
        </a>
        <a class="login-btn naver" id="naverLoginBtn">
            <svg viewBox="0 0 24 24"><path fill="#fff" d="M16.27 3H7.73A4.73 4.73 0 003 7.73v8.54A4.73 4.73 0 007.73 21h8.54A4.73 4.73 0 0021 16.27V7.73A4.73 4.73 0 0016.27 3zm.46 12.7l-3.58-5.17v5.17h-2.3V8.3h2.45l3.58 5.17V8.3h2.3v7.4h-2.45z"/></svg>
            네이버 로그인
        </a>
    </div>
</div>

<div class="chat-area" id="chatArea" style="display:none">
    <div class="welcome">
        <div class="welcome-logo"><img src="logo-icon.png" alt="세무회계 이윤"></div>
        <h2>무엇이든 물어보세요</h2>
        <p>종합소득세, 양도소득세, 상속세, 증여세<br>부가세, 법인세 등 세무 상담을 도와드립니다</p>
        <p class="ai-notice">AI 기반 세무 상담 서비스</p>
    </div>
</div>

<div class="quick" id="quickArea" style="display:none">
    <button onclick="askQuick(this)">사업 처음 시작하려면?</button>
    <button onclick="askQuick(this)">부가세 신고 기한</button>
    <button onclick="askQuick(this)">폐업 후 세금 신고</button>
    <button onclick="askQuick(this)">연금저축 세액공제</button>
</div>

<div class="refund-bar" id="refundBar" style="display:none">
    <a href="https://taxfriends.etaxmate.co.kr/index_default?USERID=taxfriends" target="_blank" class="refund-btn">
        <div class="refund-icon">💰</div>
        <div class="refund-text">
            <span class="refund-title">AI 자동 환급 조회</span>
            <span class="refund-desc">내가 더 낸 세금, 무료로 확인해보세요</span>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8b95a1" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </a>
</div>

<div class="disclaimer" id="disclaimer" style="display:none">
    <p>본 서비스는 AI 기반 답변으로, 실제 세법 적용과 차이가 있을 수 있습니다. 정확한 세무 판단은 반드시 전문가와 상담하세요.</p>
</div>

<div class="cta-bar" id="ctaBar" style="display:none">
    <a href="tel:053-269-1213">
        <div class="cta-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div>
        <span class="cta-text">구체적인 적용은 세무회계 이윤에 문의해 주세요</span>
        <span class="cta-phone">053-269-1213</span>
    </a>
</div>

<div class="input-bar" id="inputBar" style="display:none">
    <input type="text" id="userInput" placeholder="메시지 보내기" onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
    </button>
</div>

<script>
const S=`세무회계 이윤 AI`;
let messages=[{role:"system",content:S}];
let loading=false;
const sid='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
let currentUser=null;

async function checkAuth(){
    try{
        const r=await fetch('/api/auth/me');
        const d=await r.json();
        if(d.logged_in){currentUser=d.user;showChat()}
        else{showLogin()}
    }catch{showLogin()}
}

function showLogin(){
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('chatArea').style.display='none';
    document.getElementById('quickArea').style.display='none';
    document.getElementById('ctaBar').style.display='none';
    document.getElementById('inputBar').style.display='none';
    document.getElementById('disclaimer').style.display='none';
    document.getElementById('userInfo').style.display='none';
    const origin=location.origin;
    document.getElementById('kakaoLoginBtn').onclick=async function(){
        const r=await fetch('/api/auth/config');const c=await r.json();
        location.href='https://kauth.kakao.com/oauth/authorize?client_id='+c.kakao_client_id+'&redirect_uri='+encodeURIComponent(origin+'/api/auth/kakao')+'&response_type=code';
    };
    document.getElementById('naverLoginBtn').onclick=async function(){
        const r=await fetch('/api/auth/config');const c=await r.json();
        const state=Math.random().toString(36).slice(2);
        location.href='https://nid.naver.com/oauth2.0/authorize?client_id='+c.naver_client_id+'&redirect_uri='+encodeURIComponent(origin+'/api/auth/naver')+'&response_type=code&state='+state;
    };
}

function showChat(){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('chatArea').style.display='flex';
    document.getElementById('quickArea').style.display='flex';
    document.getElementById('refundBar').style.display='block';
    document.getElementById('disclaimer').style.display='block';
    document.getElementById('ctaBar').style.display='block';
    document.getElementById('inputBar').style.display='flex';
    document.getElementById('userInfo').style.display='flex';
    document.getElementById('resetBtn').style.display='inline';
    document.getElementById('logoutBtn').style.display='inline';
    const avatar=document.getElementById('userAvatar');
    if(currentUser.profile_image){
        avatar.innerHTML='<img src="'+currentUser.profile_image+'" alt="" onerror="this.parentElement.textContent=\''+ ((currentUser.name||'?')[0]) +'\'">';
    }else{
        avatar.textContent=(currentUser.name||'?')[0];
    }
    renderTaxAlerts();
    loadHistory();
}

async function loadHistory(){
    try{
        const r=await fetch('/api/auth/history');
        const d=await r.json();
        if(d.messages && d.messages.length>0){
            const c=document.getElementById("chatArea");
            const w=c.querySelector(".welcome");if(w)w.remove();
            document.getElementById("quickArea").style.display="none";
            for(const m of d.messages){
                add(m.role,m.content);
                messages.push({role:m.role,content:m.content});
            }
        }
    }catch{}
}

checkAuth();

function add(role,text){
    const c=document.getElementById("chatArea");
    const w=c.querySelector(".welcome");if(w)w.remove();
    const d=document.createElement("div");
    d.className=`msg msg-${role==="user"?"user":"ai"}`;
    d.innerHTML=role==="user"
        ?`<div class="msg-wrap"><div class="msg-bubble">${esc(text)}</div></div>`
        :`<div class="msg-avatar"><img src="logo-icon.png" alt=""></div><div class="msg-wrap"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble">${esc(text)}</div></div>`;
    c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function showDots(){
    const c=document.getElementById("chatArea");const d=document.createElement("div");
    d.className="msg msg-ai";d.id="dots";
    d.innerHTML=`<div class="msg-avatar"><img src="logo-icon.png" alt=""></div><div class="msg-wrap"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
    c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function hideDots(){const d=document.getElementById("dots");if(d)d.remove()}
function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}

async function sendMessage(){
    if(loading)return;const i=document.getElementById("userInput");const t=i.value.trim();if(!t)return;
    i.value="";add("user",t);messages.push({role:"user",content:t});
    document.getElementById("quickArea").style.display="none";
    loading=true;document.getElementById("sendBtn").disabled=true;showDots();
    try{
        const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages,sessionId:sid})});
        if(r.status===401){hideDots();showLogin();return}
        if(!r.ok){const err=await r.json().catch(()=>({}));throw new Error(err.error||`오류 (${r.status})`);}

        // 스트리밍 응답 처리
        const c=document.getElementById("chatArea");
        const statusEl=document.getElementById("dots");

        // 상태 표시 영역 (로딩 dots를 상태 메시지로 교체)
        let streamStarted=false;
        let msgDiv,bubble;
        let fullText="";
        const reader=r.body.getReader();
        const decoder=new TextDecoder();
        let buf="";

        while(true){
            const{done,value}=await reader.read();
            if(done)break;
            buf+=decoder.decode(value,{stream:true});
            const lines=buf.split("\n");
            buf=lines.pop()||"";
            for(const line of lines){
                if(line.startsWith("data: ")){
                    const data=line.slice(6).trim();
                    if(data==="[DONE]")break;
                    try{
                        const j=JSON.parse(data);
                        // 상태 메시지 표시
                        if(j.status){
                            if(statusEl){
                                const b=statusEl.querySelector(".msg-bubble");
                                if(b) b.innerHTML='<div style="display:flex;align-items:center;gap:8px"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:.82em;color:var(--text2)">'+esc(j.status)+'</span></div>';
                                c.scrollTop=c.scrollHeight;
                            }
                        }
                        // 실제 답변 컨텐츠
                        if(j.content){
                            if(!streamStarted){
                                streamStarted=true;
                                hideDots();
                                msgDiv=document.createElement("div");
                                msgDiv.className="msg msg-ai";
                                msgDiv.innerHTML='<div class="msg-avatar"><img src="logo-icon.png" alt=""></div><div class="msg-wrap"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble" id="streamBubble"></div></div>';
                                c.appendChild(msgDiv);
                                bubble=document.getElementById("streamBubble");
                            }
                            fullText+=j.content;
                            bubble.innerHTML=esc(fullText);
                            c.scrollTop=c.scrollHeight;
                        }
                    }catch{}
                }
            }
        }
        if(!streamStarted)hideDots();
        if(bubble)bubble.removeAttribute("id");
        messages.push({role:"assistant",content:fullText});
    }catch(e){hideDots();add("ai","오류가 발생했습니다: "+e.message)}
    finally{loading=false;document.getElementById("sendBtn").disabled=false;i.focus()}
}

// ===== 세금 신고/납부 기한 알림 =====
function getTaxDeadlines(){
  const now=new Date(Date.now()+9*60*60*1000); // KST
  const y=now.getFullYear();
  const deadlines=[
    // 법인세
    {name:"법인세 신고/납부",date:new Date(y,2,31),cat:"법인"},
    {name:"법인 지방소득세 신고/납부",date:new Date(y,2,31),cat:"법인"},
    {name:"법인세 중간예납",date:new Date(y,7,31),cat:"법인"},
    // 소득세 (종합소득세)
    {name:"종합소득세 확정신고/납부",date:new Date(y,4,31),cat:"소득"},
    {name:"개인 지방소득세 신고/납부",date:new Date(y,4,31),cat:"소득"},
    {name:"종합소득세 신고/납부 (성실신고확인대상)",date:new Date(y,5,30),cat:"소득"},
    // 부가가치세
    {name:"부가세 확정신고 (2기, 전년 7~12월)",date:new Date(y,0,26),cat:"부가"},
    {name:"부가세 예정신고 (1기, 1~3월) - 법인",date:new Date(y,3,25),cat:"부가"},
    {name:"부가세 확정신고 (1기, 1~6월)",date:new Date(y,6,25),cat:"부가"},
    {name:"부가세 예정신고 (2기, 7~9월) - 법인",date:new Date(y,9,25),cat:"부가"},
    // 원천세 (매월 10일)
    {name:"원천세 신고/납부 (1월분)",date:new Date(y,1,10),cat:"원천"},
    {name:"원천세 신고/납부 (2월분)",date:new Date(y,2,10),cat:"원천"},
    {name:"원천세 신고/납부 (3월분)",date:new Date(y,3,10),cat:"원천"},
    {name:"원천세 신고/납부 (4월분)",date:new Date(y,4,11),cat:"원천"},
    {name:"원천세 신고/납부 (5월분)",date:new Date(y,5,10),cat:"원천"},
    {name:"원천세 신고/납부 (6월분)",date:new Date(y,6,10),cat:"원천"},
    {name:"원천세 신고/납부 (7월분)",date:new Date(y,7,10),cat:"원천"},
    {name:"원천세 신고/납부 (8월분)",date:new Date(y,8,10),cat:"원천"},
    {name:"원천세 신고/납부 (9월분)",date:new Date(y,9,12),cat:"원천"},
    {name:"원천세 신고/납부 (10월분)",date:new Date(y,10,10),cat:"원천"},
    {name:"원천세 신고/납부 (11월분)",date:new Date(y,11,10),cat:"원천"},
    {name:"원천세 신고/납부 (12월분)",date:new Date(y+1,0,12),cat:"원천"},
  ];
  // 토/일이면 다음 월요일로 연장
  deadlines.forEach(d=>{
    const day=d.date.getDay();
    if(day===0) d.date.setDate(d.date.getDate()+1);
    if(day===6) d.date.setDate(d.date.getDate()+2);
  });
  return deadlines;
}

function checkTaxAlerts(){
  const hideWoncheon=localStorage.getItem('hideWoncheon')==='true';
  const dismissed=JSON.parse(localStorage.getItem('taxDismissed')||'{}');
  const now=new Date(Date.now()+9*60*60*1000);
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const deadlines=getTaxDeadlines();
  const alerts=[];

  for(const d of deadlines){
    if(hideWoncheon && d.cat==='원천') continue;
    const key=d.name+'_'+d.date.getTime();
    if(dismissed[key]) continue;
    const diff=Math.ceil((d.date-today)/(1000*60*60*24));
    if(diff>=0 && diff<=3){
      const dday=diff===0?'오늘 마감':diff===1?'내일 마감':diff+'일 남음';
      const mm=d.date.getMonth()+1;
      const dd=d.date.getDate();
      alerts.push({name:d.name,dday,dateStr:mm+'월 '+dd+'일',key,cat:d.cat});
    }
  }
  return alerts;
}

function renderTaxAlerts(){
  const area=document.getElementById('taxAlertArea');
  const alerts=checkTaxAlerts();
  if(alerts.length===0){area.style.display='none';return;}
  area.style.display='block';
  const hideWoncheon=localStorage.getItem('hideWoncheon')==='true';
  let html='';
  for(const a of alerts){
    html+=`<div class="tax-alert" id="alert_${a.key.replace(/[^a-zA-Z0-9]/g,'_')}">
      <span class="tax-alert-icon">📌</span>
      <span class="tax-alert-text">${a.name} (${a.dateStr}) - ${a.dday}</span>
      <button class="tax-alert-close" onclick="dismissAlert('${a.key}',this)" title="닫기">✕</button>
    </div>`;
  }
  // 원천세 표시 여부 토글 (하단에 작게)
  const hasWoncheon=alerts.some(a=>a.cat==='원천');
  const woncheonExists=getTaxDeadlines().some(d=>{
    const now=new Date(Date.now()+9*60*60*1000);
    const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const diff=Math.ceil((d.date-today)/(1000*60*60*24));
    return d.cat==='원천'&&diff>=0&&diff<=2;
  });
  if(hasWoncheon||(!hideWoncheon===false&&woncheonExists)){
    html+=`<div style="text-align:right;padding:2px 20px 0"><button class="tax-alert-setting" onclick="toggleWoncheon()">${hideWoncheon?'원천세 알림 켜기':'원천세 알림 끄기'}</button></div>`;
  }else if(hideWoncheon&&woncheonExists){
    html+=`<div style="text-align:right;padding:2px 20px 0"><button class="tax-alert-setting" onclick="toggleWoncheon()">원천세 알림 켜기</button></div>`;
  }
  area.innerHTML=html;
}

function dismissAlert(key,btn){
  const dismissed=JSON.parse(localStorage.getItem('taxDismissed')||'{}');
  dismissed[key]=true;
  localStorage.setItem('taxDismissed',JSON.stringify(dismissed));
  const el=btn.closest('.tax-alert');
  if(el)el.style.display='none';
  // 전부 닫혔으면 영역 숨김
  const area=document.getElementById('taxAlertArea');
  if(!area.querySelector('.tax-alert[style*="display: none"]')===false&&area.querySelectorAll('.tax-alert:not([style*="display: none"])').length===0){
    area.style.display='none';
  }
}

function toggleWoncheon(){
  const current=localStorage.getItem('hideWoncheon')==='true';
  localStorage.setItem('hideWoncheon',String(!current));
  // dismissed 초기화 (원천세 관련)
  if(current){
    const dismissed=JSON.parse(localStorage.getItem('taxDismissed')||'{}');
    for(const k of Object.keys(dismissed)){if(k.includes('원천세'))delete dismissed[k];}
    localStorage.setItem('taxDismissed',JSON.stringify(dismissed));
  }
  renderTaxAlerts();
}
