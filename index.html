<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>세무회계 이윤 - AI 세무 상담</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Malgun Gothic',sans-serif;background:#f2f2f7;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* 헤더 */
.header{background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(0,0,0,.08);position:sticky;top:0;z-index:10}
.header img{height:34px;border-radius:8px}
.header-text h1{font-size:.95em;font-weight:600;color:#1d1d1f;letter-spacing:-.2px}
.header-text p{font-size:.65em;color:#86868b;margin-top:1px;font-weight:500}
.column-link{margin-left:auto;color:#0071e3;font-size:.78em;text-decoration:none;font-weight:500;padding:6px 14px;border-radius:16px;transition:.2s}
.column-link:hover{background:rgba(0,113,227,.08)}

/* 채팅 영역 */
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;background:#f2f2f7}
.chat-area::-webkit-scrollbar{display:none}

/* 메시지 */
.msg{display:flex;gap:8px;max-width:76%;animation:fadeIn .35s ease}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6em;flex-shrink:0;font-weight:600;background:linear-gradient(135deg,#1a2d4e,#2c4a7c);color:#fff}
.msg-user .msg-avatar{display:none}
.msg-content{display:flex;flex-direction:column;gap:2px}
.msg-ai .msg-name{font-size:.65em;color:#86868b;margin-bottom:1px;margin-left:4px;font-weight:500}
.msg-bubble{padding:10px 14px;font-size:.88em;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg-ai .msg-bubble{background:#fff;color:#1d1d1f;border-radius:18px;border-top-left-radius:6px;box-shadow:0 0.5px 1px rgba(0,0,0,.04)}
.msg-user .msg-bubble{background:#0071e3;color:#fff;border-radius:18px;border-top-right-radius:6px}

/* 로딩 */
.typing-dots{display:flex;gap:4px;padding:4px 0;align-items:center}
.typing-dots span{width:6px;height:6px;background:#86868b;border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.16s}
.typing-dots span:nth-child(3){animation-delay:.32s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.25}30%{transform:translateY(-5px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* 빠른질문 */
.quick-area{padding:4px 20px 2px;display:flex;gap:6px;flex-wrap:wrap;background:#f2f2f7}
.quick-btn{background:#fff;border:none;color:#0071e3;padding:8px 16px;border-radius:18px;font-size:.78em;cursor:pointer;transition:.15s;font-weight:500;box-shadow:0 0.5px 1px rgba(0,0,0,.04)}
.quick-btn:hover{background:#e8e8ed}
.quick-btn:active{transform:scale(.97)}

/* 하단 전화 바 */
.bottom-bar{padding:4px 20px;background:#f2f2f7}
.bottom-cta{display:flex;align-items:center;gap:8px;background:#fff;border:none;border-radius:14px;padding:10px 16px;text-decoration:none;color:#1d1d1f;transition:.15s;box-shadow:0 0.5px 1px rgba(0,0,0,.04)}
.bottom-cta:hover{background:#e8e8ed}
.bottom-cta:active{transform:scale(.99)}
.cta-icon{font-size:1em}
.cta-text{flex:1;font-size:.68em;line-height:1.3;color:#86868b}
.cta-phone{font-size:.85em;font-weight:600;color:#0071e3;white-space:nowrap}

/* 입력 영역 */
.input-area{padding:10px 20px 16px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);display:flex;gap:8px;border-top:1px solid rgba(0,0,0,.06)}
.input-area input{flex:1;padding:10px 16px;background:#f2f2f7;border:1px solid rgba(0,0,0,.06);border-radius:20px;font-size:.88em;outline:none;transition:.2s;color:#1d1d1f;font-family:inherit}
.input-area input::placeholder{color:#aeaeb2}
.input-area input:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.send-btn{width:34px;height:34px;background:#0071e3;color:#fff;border:none;border-radius:50%;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:center}
.send-btn:hover{background:#0077ed}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{background:#d1d1d6;cursor:not-allowed;transform:none}
.send-btn svg{width:16px;height:16px;fill:#fff}

/* 웰컴 */
.welcome{text-align:center;padding:60px 24px}
.welcome-icon{width:56px;height:56px;background:linear-gradient(135deg,#1a2d4e,#2c4a7c);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 4px 12px rgba(26,45,78,.25)}
.welcome-icon img{height:30px;border-radius:6px}
.welcome h2{color:#1d1d1f;margin-bottom:8px;font-size:1.15em;font-weight:600;letter-spacing:-.3px}
.welcome p{font-size:.84em;line-height:1.55;color:#86868b;font-weight:400}

/* 모바일 */
@media(max-width:600px){
    .header{padding:10px 16px}
    .header img{height:30px}
    .header-text h1{font-size:.88em}
    .msg{max-width:84%}
    .quick-area{padding:4px 14px 2px}
    .quick-btn{font-size:.74em;padding:7px 13px}
    .input-area{padding:8px 14px 12px}
    .bottom-bar{padding:4px 14px}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="세무회계 이윤">
    <div class="header-text">
        <h1>AI 세무 상담</h1>
        <p>세무회계 이윤</p>
    </div>
    <a href="/articles.html" class="column-link">칼럼</a>
</div>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <div class="welcome-icon"><img src="logo.png" alt=""></div>
        <h2>무엇이든 물어보세요</h2>
        <p>종합소득세, 양도소득세, 상속세, 증여세,<br>부가세, 법인세 등 세무 상담을 도와드립니다.</p>
    </div>
</div>

<div class="quick-area" id="quickArea">
    <button class="quick-btn" onclick="askQuick(this)">사업 처음 시작하려면?</button>
    <button class="quick-btn" onclick="askQuick(this)">부가세 신고 기한</button>
    <button class="quick-btn" onclick="askQuick(this)">폐업 후 세금 신고</button>
    <button class="quick-btn" onclick="askQuick(this)">연금저축 세액공제</button>
</div>

<div class="bottom-bar">
    <a href="tel:053-269-1213" class="bottom-cta">
        <span class="cta-icon">📞</span>
        <span class="cta-text">구체적인 적용은 세무회계 이윤에 문의해 주세요</span>
        <span class="cta-phone">053-269-1213</span>
    </a>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
const SYSTEM_PROMPT = `세무회계 이윤 AI 세무 상담`;
let messages = [{ role: "system", content: SYSTEM_PROMPT }];
let isLoading = false;
const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

function addMessage(role, content) {
    const chatArea = document.getElementById("chatArea");
    const welcome = chatArea.querySelector(".welcome");
    if (welcome) welcome.remove();
    const div = document.createElement("div");
    div.className = `msg msg-${role === "user" ? "user" : "ai"}`;
    if (role === "user") {
        div.innerHTML = `<div class="msg-content"><div class="msg-bubble">${escapeHtml(content)}</div></div>`;
    } else {
        div.innerHTML = `<div class="msg-avatar">이윤</div><div class="msg-content"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble">${escapeHtml(content)}</div></div>`;
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function showLoading() {
    const chatArea = document.getElementById("chatArea");
    const div = document.createElement("div");
    div.className = "msg msg-ai";
    div.id = "loadingMsg";
    div.innerHTML = `<div class="msg-avatar">이윤</div><div class="msg-content"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoading() {
    const el = document.getElementById("loadingMsg");
    if (el) el.remove();
}

function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    addMessage("user", text);
    messages.push({ role: "user", content: text });
    document.getElementById("quickArea").style.display = "none";
    isLoading = true;
    document.getElementById("sendBtn").disabled = true;
    showLoading();
    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: messages, sessionId: sessionId })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `API 오류 (${res.status})`);
        }
        const data = await res.json();
        const reply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: reply });
        removeLoading();
        addMessage("assistant", reply);
    } catch (e) {
        removeLoading();
        addMessage("assistant", "오류가 발생했습니다: " + e.message);
    } finally {
        isLoading = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
    }
}

function askQuick(btn) {
    document.getElementById("userInput").value = btn.textContent;
    sendMessage();
}
</script>
</body>
</html>
