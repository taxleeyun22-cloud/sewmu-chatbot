<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세무회계 이윤 - AI 세무 상담</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}

/* 헤더 */
.header{background:#1a2d4e;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header img{height:44px}
.header-text{color:#fff}
.header-text h1{font-size:1.1em;font-weight:700}
.header-text p{font-size:.72em;opacity:.7}

/* 채팅 영역 */
.chat-area{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;max-width:85%;animation:fadeIn .3s}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8em;flex-shrink:0;color:#fff}
.msg-ai .msg-avatar{background:#1a2d4e}
.msg-user .msg-avatar{background:#4a6cf7}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:.88em;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg-ai .msg-bubble{background:#fff;color:#222;border:1px solid #e0e0e0;border-top-left-radius:4px}
.msg-user .msg-bubble{background:#1a2d4e;color:#fff;border-top-right-radius:4px}

/* 로딩 */
.typing-dots{display:flex;gap:4px;padding:12px 16px;align-items:center}
.typing-dots span{width:8px;height:8px;background:#1a2d4e;border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 빠른질문 */
.quick-area{padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap}
.quick-btn{background:#fff;border:1px solid #1a2d4e;color:#1a2d4e;padding:8px 14px;border-radius:20px;font-size:.78em;cursor:pointer;transition:.2s;white-space:nowrap}
.quick-btn:hover{background:#1a2d4e;color:#fff}

/* 입력 영역 */
.input-area{padding:12px 20px 16px;background:#fff;border-top:1px solid #e8e8e8;display:flex;gap:8px}
.input-area input{flex:1;padding:12px 16px;border:1px solid #ddd;border-radius:24px;font-size:.9em;outline:none;transition:.2s}
.input-area input:focus{border-color:#1a2d4e}
.input-area button{background:#1a2d4e;color:#fff;border:none;border-radius:24px;padding:0 20px;font-size:.9em;cursor:pointer;transition:.2s}
.input-area button:hover{background:#2a4070}
.input-area button:disabled{background:#999;cursor:not-allowed}

/* 웰컴 */
.welcome{text-align:center;color:#888;padding:40px 20px}
.welcome h2{color:#1a2d4e;margin-bottom:8px;font-size:1.2em}
.welcome p{font-size:.85em;line-height:1.6}

/* 모바일 */
@media(max-width:600px){
    .header img{height:36px}
    .header-text h1{font-size:.95em}
    .msg{max-width:92%}
    .quick-area{padding:8px 12px}
    .quick-btn{font-size:.72em;padding:6px 10px}
    .input-area{padding:8px 12px 12px}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="세무회계 이윤">
    <div class="header-text">
        <h1>AI 세무 상담</h1>
        <p>대구 달서구 세무회계 이윤</p>
    </div>
</div>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <h2>안녕하세요! 세무회계 이윤입니다.</h2>
        <p>종합소득세, 양도소득세, 상속세, 증여세,<br>부가세, 법인세 등 세무 관련 질문을 해주세요.</p>
    </div>
</div>

<div class="quick-area" id="quickArea">
    <button class="quick-btn" onclick="askQuick(this)">종합소득세 신고 대상이 뭔가요</button>
    <button class="quick-btn" onclick="askQuick(this)">차용증 없으면 증여세 나오나요</button>
    <button class="quick-btn" onclick="askQuick(this)">상속세 사전증여 합산 기준이 뭔가요</button>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="세무 관련 질문을 입력하세요..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">전송</button>
</div>

<script>
const SYSTEM_PROMPT = `너는 대구 달서구 세무회계 이윤의 AI 세무 상담 어시스턴트야.
종합소득세, 양도소득세, 상속세, 증여세, 부가세, 법인세 관련 질문에 친절하고 정확하게 답변해.
답변은 핵심만 간결하게, 전문용어는 쉽게 풀어서 설명해.
복잡한 상황은 "정확한 상담은 세무회계 이윤에 문의해 주세요"로 마무리해.
항상 한국어로 답변해.`;

let messages = [{ role: "system", content: SYSTEM_PROMPT }];
let isLoading = false;

function addMessage(role, content) {
    const chatArea = document.getElementById("chatArea");
    const welcome = chatArea.querySelector(".welcome");
    if (welcome) welcome.remove();

    const div = document.createElement("div");
    div.className = `msg msg-${role === "user" ? "user" : "ai"}`;
    div.innerHTML = `
        <div class="msg-avatar">${role === "user" ? "나" : "AI"}</div>
        <div class="msg-bubble">${escapeHtml(content)}</div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function showLoading() {
    const chatArea = document.getElementById("chatArea");
    const div = document.createElement("div");
    div.className = "msg msg-ai";
    div.id = "loadingMsg";
    div.innerHTML = `
        <div class="msg-avatar">AI</div>
        <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    `;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoading() {
    const el = document.getElementById("loadingMsg");
    if (el) el.remove();
}

function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    addMessage("user", text);
    messages.push({ role: "user", content: text });

    document.getElementById("quickArea").style.display = "none";
    isLoading = true;
    document.getElementById("sendBtn").disabled = true;
    showLoading();

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: messages })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `API 오류 (${res.status})`);
        }

        const data = await res.json();
        const reply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: reply });
        removeLoading();
        addMessage("assistant", reply);
    } catch (e) {
        removeLoading();
        addMessage("assistant", "오류가 발생했습니다: " + e.message);
    } finally {
        isLoading = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
    }
}

function askQuick(btn) {
    document.getElementById("userInput").value = btn.textContent;
    sendMessage();
}
</script>
</body>
</html>
