<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>세무회계 이윤 - AI 세무 상담</title>
<meta name="theme-color" content="#ffffff">
<style>
:root{--blue:#007aff;--bg:#ffffff;--bg2:#f5f5f7;--text:#1d1d1f;--text2:#86868b;--text3:#d2d2d7;--bubble-ai:#f5f5f7;--bubble-user:#007aff;--separator:rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','Malgun Gothic',sans-serif;background:var(--bg);height:100vh;height:100dvh;display:flex;flex-direction:column;color:var(--text);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* ── 헤더 ── */
.header{background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);padding:0 16px;height:60px;display:flex;align-items:center;border-bottom:0.5px solid var(--separator);position:sticky;top:0;z-index:10}
.header-logo{height:40px}
.header-right{margin-left:auto}
.header-right a{color:var(--blue);font-size:.85em;text-decoration:none;font-weight:500}

/* ── 채팅 ── */
.chat-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;background:var(--bg)}
.chat-area::-webkit-scrollbar{display:none}

.msg{display:flex;gap:8px;max-width:72%;animation:msgIn .3s ease}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;margin-top:2px}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-user .msg-avatar{display:none}
.msg-wrap{display:flex;flex-direction:column;gap:1px}
.msg-name{font-size:.6em;color:var(--text2);margin-left:2px;margin-bottom:2px;font-weight:500}
.msg-bubble{padding:9px 14px;font-size:.85em;line-height:1.55;word-break:break-word;white-space:pre-wrap;letter-spacing:-.1px}
.msg-ai .msg-bubble{background:var(--bubble-ai);color:var(--text);border-radius:4px 18px 18px 18px}
.msg-user .msg-bubble{background:var(--bubble-user);color:#fff;border-radius:18px 4px 18px 18px}

/* ── 로딩 ── */
.dots{display:flex;gap:4px;padding:4px 0}
.dots span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:pulse 1.2s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── 빠른질문 ── */
.quick{padding:6px 16px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick::-webkit-scrollbar{display:none}
.quick button{background:var(--bg);border:1px solid var(--separator);color:var(--text);padding:8px 16px;border-radius:20px;font-size:.78em;cursor:pointer;white-space:nowrap;font-weight:500;transition:.15s;flex-shrink:0;font-family:inherit}
.quick button:hover{background:var(--bg2)}
.quick button:active{transform:scale(.96);background:var(--bg2)}

/* ── 전화바 ── */
.cta-bar{padding:4px 16px}
.cta-bar a{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:12px;padding:10px 14px;text-decoration:none;transition:.15s}
.cta-bar a:active{transform:scale(.99)}
.cta-text{flex:1;font-size:.68em;color:var(--text2);line-height:1.3}
.cta-phone{font-size:.82em;font-weight:600;color:var(--blue)}

/* ── 입력 ── */
.input-bar{padding:8px 16px 12px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);display:flex;gap:6px;align-items:flex-end;border-top:0.5px solid var(--separator)}
.input-bar input{flex:1;padding:10px 16px;background:var(--bg2);border:0.5px solid var(--separator);border-radius:20px;font-size:.88em;outline:none;color:var(--text);font-family:inherit;transition:.2s}
.input-bar input::placeholder{color:var(--text3)}
.input-bar input:focus{border-color:var(--blue);box-shadow:0 0 0 3.5px rgba(0,122,255,.12)}
.send{width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;background:var(--blue)}
.send:active{transform:scale(.88)}
.send:disabled{background:var(--text3);cursor:default;transform:none}
.send svg{width:15px;height:15px;fill:#fff}

/* ── 웰컴 ── */
.welcome{text-align:center;padding:72px 32px 32px}
.welcome-logo{width:72px;height:72px;border-radius:18px;overflow:hidden;margin:0 auto 20px;box-shadow:0 0 0 0.5px var(--separator)}
.welcome-logo img{width:100%;height:100%;object-fit:contain;padding:8px}
.welcome h2{font-size:1.3em;font-weight:700;letter-spacing:-.4px;color:var(--text);margin-bottom:6px}
.welcome p{font-size:.88em;color:var(--text2);line-height:1.5;font-weight:400}

/* ── 모바일 ── */
@media(max-width:480px){
    .msg{max-width:82%}
    .header{padding:0 14px;height:48px}
    .welcome{padding:48px 24px 24px}
    .welcome-logo{width:60px;height:60px;border-radius:14px}
    .welcome h2{font-size:1.15em}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="세무회계 이윤" class="header-logo">
    <div class="header-right"><a href="/articles.html">칼럼</a></div>
</div>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <div class="welcome-logo"><img src="logo-icon.png" alt="세무회계 이윤"></div>
        <h2>무엇이든 물어보세요</h2>
        <p>종합소득세, 양도소득세, 상속세, 증여세<br>부가세, 법인세 등 세무 상담을 도와드립니다</p>
    </div>
</div>

<div class="quick" id="quickArea">
    <button onclick="askQuick(this)">사업 처음 시작하려면?</button>
    <button onclick="askQuick(this)">부가세 신고 기한</button>
    <button onclick="askQuick(this)">폐업 후 세금 신고</button>
    <button onclick="askQuick(this)">연금저축 세액공제</button>
</div>

<div class="cta-bar">
    <a href="tel:053-269-1213">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        <span class="cta-text">구체적인 적용은 세무회계 이윤에 문의해 주세요</span>
        <span class="cta-phone">053-269-1213</span>
    </a>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="메시지 보내기" onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/></svg>
    </button>
</div>

<script>
const S = `세무회계 이윤 AI`;
let messages = [{role:"system",content:S}];
let loading = false;
const sid = 's_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);

function add(role, text) {
    const c = document.getElementById("chatArea");
    const w = c.querySelector(".welcome");
    if (w) w.remove();
    const d = document.createElement("div");
    d.className = `msg msg-${role==="user"?"user":"ai"}`;
    d.innerHTML = role==="user"
        ? `<div class="msg-wrap"><div class="msg-bubble">${esc(text)}</div></div>`
        : `<div class="msg-avatar"><img src="logo-icon.png" alt=""></div><div class="msg-wrap"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble">${esc(text)}</div></div>`;
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
}

function showDots() {
    const c = document.getElementById("chatArea");
    const d = document.createElement("div");
    d.className="msg msg-ai";d.id="dots";
    d.innerHTML=`<div class="msg-avatar"><img src="logo-icon.png" alt=""></div><div class="msg-wrap"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
    c.appendChild(d);c.scrollTop=c.scrollHeight;
}

function hideDots(){const d=document.getElementById("dots");if(d)d.remove()}

function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}

async function sendMessage() {
    if(loading)return;
    const i=document.getElementById("userInput");
    const t=i.value.trim();if(!t)return;
    i.value="";add("user",t);messages.push({role:"user",content:t});
    document.getElementById("quickArea").style.display="none";
    loading=true;document.getElementById("sendBtn").disabled=true;showDots();
    try{
        const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages,sessionId:sid})});
        if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||`오류 (${r.status})`);
        const d=await r.json();const reply=d.choices[0].message.content;
        messages.push({role:"assistant",content:reply});hideDots();add("ai",reply);
    }catch(e){hideDots();add("ai","오류가 발생했습니다: "+e.message)}
    finally{loading=false;document.getElementById("sendBtn").disabled=false;i.focus()}
}

function askQuick(b){document.getElementById("userInput").value=b.textContent;sendMessage()}
</script>
</body>
</html>
