<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>세무회계 이윤 - AI 세무 상담</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#0f1923;height:100vh;display:flex;flex-direction:column}

/* 헤더 */
.header{background:linear-gradient(135deg,#1a2d4e 0%,#243b5e 100%);padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 20px rgba(0,0,0,.3);position:relative;z-index:10}
.header img{height:42px;filter:brightness(1.1)}
.header-text h1{color:#fff;font-size:1.05em;font-weight:700;letter-spacing:.5px}
.header-text p{color:rgba(255,255,255,.55);font-size:.7em;margin-top:2px}
.column-link{margin-left:auto;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:7px 14px;border-radius:20px;text-decoration:none;font-size:.78em;white-space:nowrap;transition:.3s;backdrop-filter:blur(4px)}
.column-link:hover{background:rgba(255,255,255,.18);color:#fff}

/* 채팅 영역 */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;background:linear-gradient(180deg,#0f1923 0%,#15202d 100%)}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}

/* 메시지 */
.msg{display:flex;gap:10px;max-width:82%;animation:fadeIn .4s ease}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:.75em;flex-shrink:0;font-weight:700}
.msg-ai .msg-avatar{background:linear-gradient(135deg,#4a6cf7,#6b8cff);color:#fff}
.msg-user .msg-avatar{background:linear-gradient(135deg,#2a3f5f,#1a2d4e);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
.msg-bubble{padding:12px 16px;border-radius:16px;font-size:.87em;line-height:1.7;word-break:break-word;white-space:pre-wrap}
.msg-ai .msg-bubble{background:rgba(255,255,255,.07);color:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.08);border-top-left-radius:4px;backdrop-filter:blur(4px)}
.msg-user .msg-bubble{background:linear-gradient(135deg,#4a6cf7,#5b7cff);color:#fff;border-top-right-radius:4px;box-shadow:0 2px 12px rgba(74,108,247,.3)}

/* 로딩 */
.typing-dots{display:flex;gap:5px;padding:8px 0;align-items:center}
.typing-dots span{width:7px;height:7px;background:#4a6cf7;border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* 빠른질문 */
.quick-area{padding:8px 20px 4px;display:flex;gap:8px;flex-wrap:wrap;background:transparent}
.quick-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);padding:8px 16px;border-radius:20px;font-size:.78em;cursor:pointer;transition:.3s;white-space:nowrap;backdrop-filter:blur(4px)}
.quick-btn:hover{background:rgba(74,108,247,.2);border-color:rgba(74,108,247,.4);color:#fff}

/* 하단 전화 바 */
.bottom-bar{padding:4px 20px;background:#0f1923}
.bottom-cta{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 16px;text-decoration:none;color:rgba(255,255,255,.6);transition:.3s}
.bottom-cta:hover{background:rgba(74,108,247,.1);border-color:rgba(74,108,247,.3)}
.cta-icon{font-size:1.1em}
.cta-text{flex:1;font-size:.7em;line-height:1.4}
.cta-phone{font-size:.88em;font-weight:700;color:#4a6cf7;white-space:nowrap}

/* 입력 영역 */
.input-area{padding:12px 20px 20px;background:#0f1923;display:flex;gap:8px}
.input-area input{flex:1;padding:13px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:24px;font-size:.9em;outline:none;transition:.3s;color:#fff}
.input-area input::placeholder{color:rgba(255,255,255,.3)}
.input-area input:focus{border-color:#4a6cf7;background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(74,108,247,.15)}
.input-area button{background:linear-gradient(135deg,#4a6cf7,#5b7cff);color:#fff;border:none;border-radius:24px;padding:0 22px;font-size:.88em;font-weight:600;cursor:pointer;transition:.3s;box-shadow:0 2px 12px rgba(74,108,247,.3)}
.input-area button:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(74,108,247,.4)}
.input-area button:disabled{background:#2a3344;color:rgba(255,255,255,.3);box-shadow:none;transform:none;cursor:not-allowed}

/* 웰컴 */
.welcome{text-align:center;padding:60px 20px}
.welcome-icon{font-size:3em;margin-bottom:16px;opacity:.8}
.welcome h2{color:rgba(255,255,255,.9);margin-bottom:10px;font-size:1.2em;font-weight:600}
.welcome p{font-size:.85em;line-height:1.7;color:rgba(255,255,255,.4)}

/* 모바일 */
@media(max-width:600px){
    .header{padding:12px 16px}
    .header img{height:34px}
    .header-text h1{font-size:.92em}
    .msg{max-width:90%}
    .quick-area{padding:6px 12px 2px}
    .quick-btn{font-size:.72em;padding:7px 12px}
    .input-area{padding:8px 12px 14px}
    .bottom-bar{padding:4px 12px}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="세무회계 이윤">
    <div class="header-text">
        <h1>AI 세무 상담</h1>
        <p>세무회계 이윤</p>
    </div>
    <a href="/articles.html" class="column-link">세무 칼럼</a>
</div>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <div class="welcome-icon">💬</div>
        <h2>안녕하세요, 세무회계 이윤입니다</h2>
        <p>종합소득세, 양도소득세, 상속세, 증여세,<br>부가세, 법인세 등 세무 관련 질문을 해주세요.</p>
    </div>
</div>

<div class="quick-area" id="quickArea">
    <button class="quick-btn" onclick="askQuick(this)">사업 처음 시작하려면 뭐부터 해야하나요</button>
    <button class="quick-btn" onclick="askQuick(this)">부가세 신고 기한이 언제인가요</button>
    <button class="quick-btn" onclick="askQuick(this)">폐업하면 세금 신고 어떻게 하나요</button>
    <button class="quick-btn" onclick="askQuick(this)">연금저축 세액공제 얼마나 되나요</button>
</div>

<div class="bottom-bar">
    <a href="tel:053-269-1213" class="bottom-cta">
        <span class="cta-icon">📞</span>
        <span class="cta-text">구체적인 적용은 세무회계 이윤에 문의해 주세요</span>
        <span class="cta-phone">053-269-1213</span>
    </a>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="세무 관련 질문을 입력하세요..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">전송</button>
</div>

<script>
const SYSTEM_PROMPT = `세무회계 이윤 AI 세무 상담`;
let messages = [{ role: "system", content: SYSTEM_PROMPT }];
let isLoading = false;
const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

function addMessage(role, content) {
    const chatArea = document.getElementById("chatArea");
    const welcome = chatArea.querySelector(".welcome");
    if (welcome) welcome.remove();
    const div = document.createElement("div");
    div.className = `msg msg-${role === "user" ? "user" : "ai"}`;
    div.innerHTML = `
        <div class="msg-avatar">${role === "user" ? "나" : "AI"}</div>
        <div class="msg-bubble">${escapeHtml(content)}</div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function showLoading() {
    const chatArea = document.getElementById("chatArea");
    const div = document.createElement("div");
    div.className = "msg msg-ai";
    div.id = "loadingMsg";
    div.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoading() {
    const el = document.getElementById("loadingMsg");
    if (el) el.remove();
}

function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    addMessage("user", text);
    messages.push({ role: "user", content: text });
    document.getElementById("quickArea").style.display = "none";
    isLoading = true;
    document.getElementById("sendBtn").disabled = true;
    showLoading();
    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: messages, sessionId: sessionId })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `API 오류 (${res.status})`);
        }
        const data = await res.json();
        const reply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: reply });
        removeLoading();
        addMessage("assistant", reply);
    } catch (e) {
        removeLoading();
        addMessage("assistant", "오류가 발생했습니다: " + e.message);
    } finally {
        isLoading = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
    }
}

function askQuick(btn) {
    document.getElementById("userInput").value = btn.textContent;
    sendMessage();
}
</script>
</body>
</html>
