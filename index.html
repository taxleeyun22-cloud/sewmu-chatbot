<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>세무회계 이윤 - AI 세무 상담</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#9bbbd4;height:100vh;display:flex;flex-direction:column}

/* 헤더 */
.header{background:#1a2d4e;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.header img{height:38px}
.header-text h1{color:#fff;font-size:1em;font-weight:600}
.header-text p{color:rgba(255,255,255,.5);font-size:.68em;margin-top:1px}
.column-link{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:rgba(255,255,255,.9);padding:6px 14px;border-radius:16px;text-decoration:none;font-size:.76em;transition:.2s}
.column-link:hover{background:rgba(255,255,255,.25)}

/* 채팅 영역 */
.chat-area{flex:1;overflow-y:auto;padding:16px 16px;display:flex;flex-direction:column;gap:6px;background:#9bbbd4}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:4px}

/* 날짜 구분 */
.date-divider{text-align:center;margin:12px 0 8px}
.date-divider span{background:rgba(0,0,0,.12);color:#fff;font-size:.68em;padding:4px 12px;border-radius:12px}

/* 메시지 */
.msg{display:flex;gap:8px;max-width:78%;animation:fadeIn .3s ease;margin-bottom:2px}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:.7em;flex-shrink:0;font-weight:700;overflow:hidden}
.msg-ai .msg-avatar{background:#1a2d4e;color:#fff}
.msg-user .msg-avatar{display:none}
.msg-content{display:flex;flex-direction:column;gap:2px}
.msg-ai .msg-name{font-size:.7em;color:rgba(0,0,0,.45);margin-bottom:2px;margin-left:2px}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:.88em;line-height:1.65;word-break:break-word;white-space:pre-wrap;position:relative}
.msg-ai .msg-bubble{background:#fff;color:#333;border-top-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.msg-user .msg-bubble{background:#fef01b;color:#333;border-top-right-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}

/* 로딩 */
.typing-dots{display:flex;gap:4px;padding:6px 0;align-items:center}
.typing-dots span{width:6px;height:6px;background:#999;border-radius:50%;animation:bounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 빠른질문 */
.quick-area{padding:6px 16px 2px;display:flex;gap:6px;flex-wrap:wrap;background:#9bbbd4}
.quick-btn{background:#fff;border:none;color:#333;padding:8px 14px;border-radius:18px;font-size:.76em;cursor:pointer;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.quick-btn:hover{background:#f0f0f0}

/* 하단 전화 바 */
.bottom-bar{padding:4px 16px;background:#9bbbd4}
.bottom-cta{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.7);border:none;border-radius:12px;padding:9px 14px;text-decoration:none;color:#555;transition:.2s}
.bottom-cta:hover{background:rgba(255,255,255,.9)}
.cta-icon{font-size:1em}
.cta-text{flex:1;font-size:.68em;line-height:1.3;color:#777}
.cta-phone{font-size:.85em;font-weight:700;color:#1a2d4e;white-space:nowrap}

/* 입력 영역 */
.input-area{padding:10px 16px 14px;background:#fff;display:flex;gap:8px;border-top:1px solid #e8e8e8}
.input-area input{flex:1;padding:11px 16px;background:#f5f5f5;border:none;border-radius:20px;font-size:.88em;outline:none;transition:.2s;color:#333}
.input-area input::placeholder{color:#aaa}
.input-area input:focus{background:#ececec}
.input-area button{background:#fef01b;color:#333;border:none;border-radius:20px;padding:0 18px;font-size:.85em;font-weight:700;cursor:pointer;transition:.2s}
.input-area button:hover{background:#f5e600}
.input-area button:disabled{background:#e0e0e0;color:#aaa;cursor:not-allowed}

/* 웰컴 */
.welcome{text-align:center;padding:50px 20px}
.welcome-icon{width:64px;height:64px;background:#1a2d4e;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8em;margin:0 auto 18px;color:#fff}
.welcome h2{color:#333;margin-bottom:8px;font-size:1.1em;font-weight:600}
.welcome p{font-size:.84em;line-height:1.6;color:#777}

/* 모바일 */
@media(max-width:600px){
    .header{padding:12px 14px}
    .header img{height:32px}
    .header-text h1{font-size:.9em}
    .msg{max-width:85%}
    .quick-area{padding:4px 10px 2px}
    .quick-btn{font-size:.72em;padding:7px 12px}
    .input-area{padding:8px 10px 12px}
    .bottom-bar{padding:4px 10px}
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="세무회계 이윤">
    <div class="header-text">
        <h1>AI 세무 상담</h1>
        <p>세무회계 이윤</p>
    </div>
    <a href="/articles.html" class="column-link">세무 칼럼</a>
</div>

<div class="chat-area" id="chatArea">
    <div class="welcome">
        <div class="welcome-icon">💬</div>
        <h2>세무회계 이윤입니다</h2>
        <p>종합소득세, 양도소득세, 상속세, 증여세,<br>부가세, 법인세 등 무엇이든 물어보세요.</p>
    </div>
</div>

<div class="quick-area" id="quickArea">
    <button class="quick-btn" onclick="askQuick(this)">사업 처음 시작하려면?</button>
    <button class="quick-btn" onclick="askQuick(this)">부가세 신고 기한</button>
    <button class="quick-btn" onclick="askQuick(this)">폐업 후 세금 신고</button>
    <button class="quick-btn" onclick="askQuick(this)">연금저축 세액공제</button>
</div>

<div class="bottom-bar">
    <a href="tel:053-269-1213" class="bottom-cta">
        <span class="cta-icon">📞</span>
        <span class="cta-text">구체적인 적용은 세무회계 이윤에 문의해 주세요</span>
        <span class="cta-phone">053-269-1213</span>
    </a>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="메시지를 입력하세요" onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">전송</button>
</div>

<script>
const SYSTEM_PROMPT = `세무회계 이윤 AI 세무 상담`;
let messages = [{ role: "system", content: SYSTEM_PROMPT }];
let isLoading = false;
const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);

function addMessage(role, content) {
    const chatArea = document.getElementById("chatArea");
    const welcome = chatArea.querySelector(".welcome");
    if (welcome) welcome.remove();
    const div = document.createElement("div");
    div.className = `msg msg-${role === "user" ? "user" : "ai"}`;
    if (role === "user") {
        div.innerHTML = `<div class="msg-content"><div class="msg-bubble">${escapeHtml(content)}</div></div>`;
    } else {
        div.innerHTML = `<div class="msg-avatar">이윤</div><div class="msg-content"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble">${escapeHtml(content)}</div></div>`;
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function showLoading() {
    const chatArea = document.getElementById("chatArea");
    const div = document.createElement("div");
    div.className = "msg msg-ai";
    div.id = "loadingMsg";
    div.innerHTML = `<div class="msg-avatar">이윤</div><div class="msg-content"><div class="msg-name">세무회계 이윤</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>`;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeLoading() {
    const el = document.getElementById("loadingMsg");
    if (el) el.remove();
}

function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    addMessage("user", text);
    messages.push({ role: "user", content: text });
    document.getElementById("quickArea").style.display = "none";
    isLoading = true;
    document.getElementById("sendBtn").disabled = true;
    showLoading();
    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: messages, sessionId: sessionId })
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `API 오류 (${res.status})`);
        }
        const data = await res.json();
        const reply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: reply });
        removeLoading();
        addMessage("assistant", reply);
    } catch (e) {
        removeLoading();
        addMessage("assistant", "오류가 발생했습니다: " + e.message);
    } finally {
        isLoading = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
    }
}

function askQuick(btn) {
    document.getElementById("userInput").value = btn.textContent;
    sendMessage();
}
</script>
</body>
</html>
