name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint + TypeCheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
        continue-on-error: true # ESLint 경고는 차단하지 않음 (점진 마이그레이션 중)

      - name: Vitest unit tests
        run: npm test

      - name: Vite build
        run: npm run build

      - name: Upload build artifacts (on failure for debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 3
